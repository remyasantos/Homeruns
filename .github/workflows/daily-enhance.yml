name: Daily Note Enhancement

on:
  schedule:
    # 10:30 AM ET (14:30 UTC) — 90 min after main pipeline finishes
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enhance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check today's pipeline ran successfully
        id: check
        run: |
          STATUS=$(python3 -c "
          import json
          try:
            d = json.load(open('public/last-run.json'))
            print(d.get('status', 'unknown'))
          except Exception:
            print('unknown')
          ")
          echo "Pipeline status: $STATUS"
          if [ "$STATUS" = "success" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true"  >> $GITHUB_OUTPUT
            echo "⚠ Pipeline status is '$STATUS' — skipping enhancement"
          fi

      - name: Enhance notes with Claude
        if: steps.check.outputs.skip == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 12"
          prompt: |
            You are reviewing today's MLB HR Parlay Board data in the Homeruns repo.
            The automated pipeline has already run and committed public/data.js with
            correct player scores, tiers, parlays, and all structural data.
            Your job is to validate it and improve the descriptive text quality only.

            STEP 1 — Validate:
            Run: node validate-data.js
            Report any errors or warnings.

            STEP 2 — Enhance note text for S-tier and A-tier players only:
            Read public/data.js. For every player with tier "S" or "A", rewrite:

            "note" — exactly 2 sentences:
              Sentence 1: hook stat — the single most impressive number from the player's
                existing note (ISO, OPS, HR count, SLG). Keep the same stat, sharpen the framing.
              Sentence 2: why HR today — pitcher ERA flaw + park/weather context.
                Cite real numbers already in the file (e.g. ERA, HR/9, wind speed).

            "pitcherNote" — 1 sentence, one technical flaw, must cite a real number from the file.

            Hard rules:
            - Do NOT invent or change any stat values. Only use numbers already in data.js.
            - Do NOT touch B-tier or C-tier player fields at all.
            - Do NOT change: id, name, team, tier, park, pitcher, matchupGrade, estOdds,
              tags, playerIds, legs, label, risk, riskColor, estPayout, or description.
            - Tone: sharp and betting-centric.
              Preferred terms: "disaster start", "free real estate", "cooked",
              "bomb machine", "underpriced", "pure lottery", "blowup game".

            STEP 3 — Enhance top 5 parlay strategies:
            Rewrite the "strategy" field for the first 5 entries in the parlays array.
            2-3 sentences each. Name actual player names and cite real ERA or HR figures
            that already appear in data.js. Same sharp tone.

            STEP 4 — Validate again:
            Run: node validate-data.js
            If there are any errors, fix them before moving on.

            STEP 5 — Commit and push if anything changed:
            Run these commands:
              git config user.name  "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add public/data.js
            Then check: git diff --cached --quiet
            If changes are staged, commit and push:
              git commit -m "data: note enhancement $(date +'%b %-d')"
              git push origin main
            If nothing changed, report that no changes were needed.
