name: Daily Statcast Matchups
permissions:
  contents: write

on:
  schedule:
    # 1:00 PM UTC / 9:00 AM ET — runs after the slate pipeline (11:00 UTC)
    # so today's starters are already known when Savant data is fetched.
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Override date (MM/DD/YYYY) — leave blank for today'
        required: false
        default: ''

jobs:
  generate-matchups:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch today's slate (needed for game/pitcher data)
        run: python scripts/fetch_slate.py
        continue-on-error: true

      - name: Check for games (off-day guard)
        run: |
          if [ ! -f scripts/raw_slate.json ]; then
            echo "raw_slate.json missing (fetch failed) — will bootstrap from data.js"
            echo "OFF_DAY=false" >> $GITHUB_ENV
            echo "FETCH_FAILED=true" >> $GITHUB_ENV
          else
            STATUS=$(python3 -c "import json; d=json.load(open('scripts/raw_slate.json')); print(d['status'])")
            echo "Slate status: $STATUS"
            if [ "$STATUS" = "no-games" ]; then
              echo "OFF_DAY=true" >> $GITHUB_ENV
            else
              echo "OFF_DAY=false" >> $GITHUB_ENV
            fi
            echo "FETCH_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Fetch Baseball Savant Statcast data
        if: env.OFF_DAY == 'false' && env.FETCH_FAILED == 'false'
        run: python scripts/fetch_savant.py
        continue-on-error: true

      - name: Score matchups
        if: env.OFF_DAY == 'false' && env.FETCH_FAILED == 'false'
        run: python scripts/score_matchups.py
        continue-on-error: true

      - name: Generate matchups_data.js
        if: env.OFF_DAY == 'false' && env.FETCH_FAILED == 'false'
        run: python scripts/generate_matchups_js.py
        continue-on-error: true

      - name: Bootstrap matchups_data.js from data.js (fallback)
        if: env.OFF_DAY == 'false'
        run: |
          # Run bootstrap if: fetch failed, or matchups_data.js is missing/empty/has no games
          NEED_BOOTSTRAP=false
          if [ "$FETCH_FAILED" = "true" ]; then
            NEED_BOOTSTRAP=true
          elif [ ! -f public/matchups_data.js ]; then
            NEED_BOOTSTRAP=true
          else
            GAME_COUNT=$(node -e "
              const vm=require('vm'),fs=require('fs');
              const s={};vm.createContext(s);
              vm.runInContext(fs.readFileSync('public/matchups_data.js','utf8').replace(/^(?:const|let)\s+/gm,'var '),s);
              console.log((s.MATCHUPS_GAMES||[]).length);
            " 2>/dev/null || echo "0")
            if [ "$GAME_COUNT" = "0" ]; then
              NEED_BOOTSTRAP=true
            fi
          fi

          if [ "$NEED_BOOTSTRAP" = "true" ]; then
            echo "⚠ Running bootstrap from data.js"
            node scripts/bootstrap_matchups_js.js
          else
            echo "✅ matchups_data.js already has game data — no bootstrap needed"
          fi
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false

          if [ "$OFF_DAY" = "true" ]; then
            echo "Off day — nothing to commit"
            exit 0
          fi

          if [ ! -f public/matchups_data.js ]; then
            echo "No matchups_data.js generated — nothing to commit"
            exit 0
          fi

          git add public/matchups_data.js

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          DATE_LABEL=$(python3 -c "import json; d=json.load(open('scripts/raw_slate.json')); print(d.get('label', ''))" 2>/dev/null || date +'%b %-d')
          git commit -m "data: Statcast matchups $DATE_LABEL"
          git push origin main
