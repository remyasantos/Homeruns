<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR Parlay Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="data.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0A0A0F;
    color: #e0e0e0;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%);
    border-bottom: 2px solid #ff3b3b;
    padding: 20px 24px 16px;
    text-align: center;
  }
  .header-title {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(28px, 6vw, 52px);
    letter-spacing: 4px;
    background: linear-gradient(135deg, #ff3b3b 0%, #ff9800 50%, #ffd700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .header-sub {
    font-size: 11px;
    color: #888;
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }
  .header-date {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 3px;
    color: #ff9800;
    margin-top: 4px;
  }
  .header-rule {
    font-size: 10px;
    color: #555;
    letter-spacing: 2px;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .header-rule span { color: #ff3b3b; font-weight: 500; }

  /* ── FILTERS ── */
  .filters-bar {
    background: #111118;
    border-bottom: 1px solid #222;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-label {
    font-size: 10px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .filter-btn {
    background: #1a1a24;
    border: 1px solid #333;
    color: #aaa;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: #ff9800; color: #ff9800; }
  .filter-btn.active {
    background: #ff9800;
    border-color: #ff9800;
    color: #000;
    font-weight: 500;
  }
  .filter-btn.top5-btn.active {
    background: #ff3b3b;
    border-color: #ff3b3b;
    color: #fff;
  }
  .filter-btn.top5-btn:hover { border-color: #ff3b3b; color: #ff3b3b; }

  .count-badge {
    margin-left: auto;
    font-size: 10px;
    color: #555;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .count-badge em { color: #ff9800; font-style: normal; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 20px 20px 40px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── CARD ── */
  .card {
    background: #111118;
    border: 1px solid #222;
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .card.top5 { border-color: #ff3b3b; box-shadow: 0 0 0 1px #ff3b3b22, 0 4px 20px rgba(255,59,59,0.15); }

  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #1a1a24;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .card-title-col { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
  }
  .card-meta {
    display: flex;
    gap: 6px;
    margin-top: 5px;
    align-items: center;
    flex-wrap: wrap;
  }
  .leg-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #1e1e2e;
    color: #aaa;
    border: 1px solid #333;
  }
  .top5-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 3px;
    background: #ff3b3b;
    color: #fff;
    display: none;
    border: none;
  }
  .card.top5 .top5-badge { display: inline-block; }

  .payout-col { text-align: right; flex-shrink: 0; }
  .payout-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 26px;
    letter-spacing: 1px;
    color: #4caf50;
    line-height: 1;
  }
  .payout-label {
    font-size: 9px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: right;
  }

  /* ── PLAYERS SECTION ── */
  .card-body { padding: 12px 16px; }

  .players-list { display: flex; flex-direction: column; gap: 6px; }
  .player-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .game-tag {
    font-size: 9px;
    color: #555;
    letter-spacing: 1px;
    width: 82px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 4px;
    border-right: 1px solid #2a2a38;
  }
  .player-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #18181f;
    border: 1px solid #2a2a38;
    border-radius: 20px;
    padding: 3px 10px 3px 8px;
    flex: 1;
    min-width: 0;
  }
  .pill-name {
    font-size: 12px;
    font-weight: 500;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .pill-tier {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .tier-S { background: #2a2000; color: #ffd700; border: 1px solid #ffd70033; }
  .tier-A { background: #0a2a0a; color: #4caf50; border: 1px solid #4caf5033; }
  .tier-B { background: #0a1a2a; color: #64b5f6; border: 1px solid #64b5f633; }
  .tier-C { background: #1a0a2a; color: #ce93d8; border: 1px solid #ce93d833; }
  .pill-odds {
    font-size: 11px;
    color: #ff9800;
    font-weight: 500;
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ── GAMES COVERED ── */
  .games-covered {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 10px 16px;
    border-top: 1px solid #1a1a24;
  }
  .games-label {
    font-size: 9px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 100%;
    margin-bottom: 2px;
  }
  .game-chip {
    font-size: 9px;
    padding: 2px 7px;
    background: #1a1a2a;
    border: 1px solid #2a2a3a;
    border-radius: 3px;
    color: #666;
    letter-spacing: 0.5px;
  }

  /* ── STRATEGY SECTION ── */
  .strategy-toggle {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid #1a1a24;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color 0.15s;
  }
  .strategy-toggle:hover { color: #aaa; }
  .strategy-toggle .arrow { transition: transform 0.2s; }
  .strategy-toggle.open .arrow { transform: rotate(180deg); }
  .strategy-body {
    display: none;
    padding: 12px 16px;
    border-top: 1px solid #1a1a24;
    font-size: 11px;
    color: #888;
    line-height: 1.7;
  }
  .strategy-body.open { display: block; }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #444;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 500px) {
    .grid { padding: 12px 12px 40px; gap: 12px; }
    .filters-bar { padding: 10px 12px; }
  }
</style>
</head>

// ─── BUILD UI ───────────────────────────────────────────────────────────────

function getPlayerById(id) {
  return players.find(p => p.id === id);
}

function getGame(player) {
  return TEAM_TO_GAME[player.team] || player.team;
}

function buildCard(parlay) {
  const card = document.createElement('div');
  card.className = 'card' + (parlay.top5 ? ' top5' : '');
  card.dataset.legs = parlay.legs;
  card.dataset.top5 = parlay.top5 ? '1' : '0';

  // Look up players
  const playerObjects = parlay.playerIds.map(id => {
    const p = getPlayerById(id);
    return { ...p, game: getGame(p) };
  });

  const gamesSet = [...new Set(playerObjects.map(p => p.game))];

  card.innerHTML = `
    <div class="card-header">
      <div class="card-title-col">
        <div class="card-name">${parlay.name}</div>
        <div class="card-meta">
          <span class="leg-badge">${parlay.legs}-LEG</span>
          <span class="top5-badge">🔴 TOP 5</span>
        </div>
      </div>
      <div class="payout-col">
        <div class="payout-value">${parlay.estPayout}</div>
        <div class="payout-label">Est. Payout</div>
      </div>
    </div>

    <div class="card-body">
      <div class="players-list">
        ${playerObjects.map(p => `
          <div class="player-row">
            <div class="game-tag">${p.game}</div>
            <div class="player-pill">
              <span class="pill-name">${p.name}</span>
              <span class="pill-tier tier-${p.tier}">${p.tier}</span>
              <span class="pill-odds">${p.estOdds}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="games-covered">
      <div class="games-label">Games Covered</div>
      ${gamesSet.map(g => `<span class="game-chip">${g}</span>`).join('')}
    </div>

    <button class="strategy-toggle" onclick="toggleStrategy(this)">
      <span>SHOW STRATEGY</span>
      <span class="arrow">▼</span>
    </button>
    <div class="strategy-body">
      ${parlay.strategy}
    </div>
  `;

  return card;
}

function toggleStrategy(btn) {
  btn.classList.toggle('open');
  const body = btn.nextElementSibling;
  body.classList.toggle('open');
  btn.querySelector('span:first-child').textContent = body.classList.contains('open') ? 'HIDE STRATEGY' : 'SHOW STRATEGY';
}

function renderAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  PARLAYS.forEach(p => grid.appendChild(buildCard(p)));
  updateCount();
}

function updateCount() {
  const visible = document.querySelectorAll('#grid .card:not([style*="display: none"])').length;
  document.getElementById('visibleCount').textContent = visible;
}

function applyFilters() {
  const activeLeg = document.querySelector('[data-legs].active')?.dataset.legs || 'all';
  const top5Only = document.getElementById('top5Filter').dataset.top5 === 'true';

  document.querySelectorAll('#grid .card').forEach(card => {
    const legMatch = activeLeg === 'all' || card.dataset.legs === activeLeg;
    const top5Match = !top5Only || card.dataset.top5 === '1';
    card.style.display = legMatch && top5Match ? '' : 'none';
  });

  // Empty state
  const grid = document.getElementById('grid');
  const existing = grid.querySelector('.empty-state');
  if (existing) existing.remove();

  const visible = [...document.querySelectorAll('#grid .card')].filter(c => c.style.display !== 'none').length;
  if (visible === 0) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.textContent = 'NO PARLAYS MATCH FILTERS';
    grid.appendChild(em);
  }

  document.getElementById('visibleCount').textContent = visible;
}

// ── Leg filter buttons
document.getElementById('legFilters').addEventListener('click', e => {
  if (!e.target.matches('[data-legs]')) return;
  document.querySelectorAll('[data-legs]').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  applyFilters();
});

// ── Top 5 toggle
document.getElementById('top5Filter').addEventListener('click', function() {
  const isActive = this.dataset.top5 === 'true';
  this.dataset.top5 = isActive ? 'false' : 'true';
  this.classList.toggle('active', !isActive);
  applyFilters();
});

// ── Init
document.getElementById('headerDate').textContent = SLATE_DATE + ' · ' + SLATE_LABEL;
renderAll();
</script>
</body>
</html>
