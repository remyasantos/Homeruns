<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB HR Matchups — Statcast Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto Mono', monospace; font-size: 12px; background: #f5f5f5; color: #333; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header { background: #0d1117; color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header-logo { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .header-date { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    #weather-status { font-size: 10px; opacity: 0.55; }
    .theme-btn { background: transparent; border: 1px solid rgba(255,255,255,0.35); color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }

    #tab-bar { background: #1a1f2e; border-bottom: 2px solid #2d3748; padding: 6px 10px; display: flex; gap: 5px; overflow-x: auto; flex-shrink: 0; }
    .tab { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-size: 11px; line-height: 1.4; text-align: center; color: #aab; transition: background 0.15s; }
    .tab:hover { background: rgba(255,255,255,0.14); }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; }
    .tab .tab-teams { font-weight: 700; font-size: 12px; }
    .tab .tab-time { font-size: 10px; opacity: 0.8; }
    @keyframes pulse-live { 0%,100%{background:#c62828} 50%{background:#ef5350} }
    .tab-live { animation: pulse-live 1.4s infinite; border-color: #ef5350 !important; }

    #main-content { flex: 1; overflow-y: auto; padding: 12px 14px; }

    .section-title { font-size: 13px; font-weight: 700; margin: 14px 0 8px; color: #1a1f2e; display: flex; align-items: center; gap: 8px; }
    .row-count { font-size: 10px; font-weight: 400; background: #e2e8f0; color: #64748b; padding: 1px 6px; border-radius: 10px; }

    .cards-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 12px; min-width: 200px; flex: 1; max-width: 320px; }
    .card-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    .card-sub-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .card-sub-tab { padding: 2px 8px; font-size: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: #f8f8f8; }
    .card-sub-tab.active { background: #1a1f2e; color: white; border-color: #1a1f2e; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 8px; }
    .stat-item { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 4px; padding: 5px 2px; text-align: center; }
    .stat-val { font-weight: 700; font-size: 12px; }
    .stat-lbl { font-size: 9px; opacity: 0.6; margin-top: 1px; }
    .pitch-detail { font-size: 11px; margin-top: 8px; line-height: 1.7; }

    .table-wrap { overflow-x: auto; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    thead th { background: #1a1f2e; color: #c8d0e0; padding: 7px 9px; text-align: right; font-weight: 600; white-space: nowrap; border-right: 1px solid #2d3748; cursor: pointer; user-select: none; }
    thead th:first-child { text-align: left; }
    thead th:hover { background: #263150; }
    .sort-arrow { margin-left: 4px; font-size: 9px; opacity: 0.5; }
    thead th.sort-asc .sort-arrow::after { content: '\25b2'; opacity: 1; }
    thead th.sort-desc .sort-arrow::after { content: '\25bc'; opacity: 1; }
    thead th:not(.sort-asc):not(.sort-desc) .sort-arrow::after { content: '\21c5'; }
    td { padding: 5px 9px; text-align: right; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    td:first-child { text-align: left; font-weight: 500; }
    tr:hover td { filter: brightness(0.96); }
    .table-footer { font-size: 10px; color: #888; padding: 4px 10px; text-align: right; font-style: italic; }

    .team-header { font-size: 13px; font-weight: 700; margin: 18px 0 6px; padding: 7px 12px; background: #1a1f2e; color: #e2e8f0; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; }
    .export-btn { font-size: 10px; padding: 2px 8px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 3px; cursor: pointer; color: white; }
    .export-btn:hover { background: rgba(255,255,255,0.25); }

    .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 700; vertical-align: middle; }
    .badge-live { background: #ef5350; color: white; }
    .live-strip { background: #fff3cd; border: 1px solid #f59e0b; border-radius: 4px; padding: 5px 10px; margin-bottom: 10px; font-size: 11px; color: #92400e; }

    .zone-grid { display: inline-grid; grid-template-columns: repeat(3, 36px); grid-template-rows: repeat(3, 36px); gap: 2px; }
    .zone-cell { width: 36px; height: 36px; border: 1px solid #ccc; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; border-radius: 2px; }
    .zone-label { font-size: 10px; color: #666; margin-bottom: 4px; text-transform: uppercase; font-weight: 600; }
    .arsenal-table td, .arsenal-table th { padding: 4px 8px; }

    .trend-up { color: #166534; font-weight: 600; }
    .trend-down { color: #991b1b; font-weight: 600; }
    .weather-card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 10px; }

    .tip { position: relative; cursor: help; }
    .tip::after { content: attr(data-tip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); white-space: nowrap; background: #1a1f2e; color: white; padding: 3px 7px; border-radius: 3px; font-size: 10px; visibility: hidden; opacity: 0; transition: opacity 0.15s; z-index: 999; pointer-events: none; }
    .tip:hover::after { visibility: visible; opacity: 1; }

    body.dark { background: #0d1117; color: #c9d1d9; }
    body.dark .card { background: #161b22; border-color: #30363d; }
    body.dark .stat-item { background: #21262d; border-color: #30363d; }
    body.dark thead th { background: #21262d; color: #8b949e; border-right-color: #30363d; }
    body.dark td { border-bottom-color: #21262d; }
    body.dark tr:hover td { filter: brightness(1.2); }
    body.dark .section-title { color: #c9d1d9; }
    body.dark .weather-card { background: #161b22; border-color: #30363d; }
    body.dark .zone-cell { border-color: #30363d; }
    body.dark .table-footer { color: #555; }

    @media (max-width: 600px) {
      .cards-grid { flex-direction: column; }
      .card { max-width: 100%; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="header-logo">&#9918; MLB HR MATCHUPS</div>
      <div class="header-date" id="header-date">Loading&#8230;</div>
    </div>
    <div class="header-right">
      <span id="weather-status"></span>
      <button class="theme-btn" onclick="toggleTheme()">&#9680; Theme</button>
    </div>
  </header>
  <div id="tab-bar"></div>
  <div id="main-content"></div>
</div>

<script src="matchups_data.js"></script>
<script>
var activeTab = 'slate';
var pitcherCardTabs = {};
var sortState = {};

function gamesData() { return (typeof MATCHUPS_GAMES !== 'undefined') ? MATCHUPS_GAMES : []; }
function pitchersData() { return (typeof MATCHUPS_PITCHERS_SLATE !== 'undefined') ? MATCHUPS_PITCHERS_SLATE : []; }

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(v, d) {
  if (v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v))) return '—';
  var f = parseFloat(v);
  if (isNaN(f)) return '—';
  return f.toFixed(d);
}
function fmtPct(v) {
  if (v === null || v === undefined || v === '' || isNaN(v)) return '—';
  return parseFloat(v).toFixed(1) + '%';
}
function fmtTime(s) {
  if (!s || s === 'TBD') return 'TBD';
  try {
    var d = new Date(s);
    return d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});
  } catch(e) { return s; }
}
function isWindOut(dir) {
  if (!dir) return false;
  var lo = dir.toLowerCase();
  return ['out','lf','cf','rf','center','left','right'].some(function(w){ return lo.indexOf(w) !== -1; });
}
function isGameLive(g) {
  if (!g.gameTime) return false;
  try {
    var elapsed = (Date.now() - new Date(g.gameTime)) / 60000;
    return elapsed >= 0 && elapsed <= 220;
  } catch(e) { return false; }
}

var BATTER_COLS = [
  {key:'matchup_score',label:'MSCORE',  d:1,  invert:false,min:0,    max:100,  tip:'Composite matchup score (0-100)'},
  {key:'khr',          label:'KHR',     d:1,  invert:false,min:30,   max:90,   tip:'xwOBA x 170, hand-split adjusted'},
  {key:'ceiling',      label:'CEIL',    d:1,  invert:false,min:0,    max:100,  tip:'Power ceiling (barrel/EV/ISO)'},
  {key:'zone_fit',     label:'ZNFIT',   d:3,  invert:false,min:0.04, max:0.20, tip:'Pitcher zone x batter zone dot product'},
  {key:'xwobac',       label:'xwOBAvP', d:3,  invert:false,min:0.200,max:0.450,tip:'xwOBA vs pitcher hand'},
  {key:'iso',          label:'ISO',     d:3,  invert:false,min:0.050,max:0.350,tip:'Isolated power'},
  {key:'hh_pct',       label:'HH%',     d:1,  pct:true, invert:false,min:25,max:60,   tip:'Hard-hit rate >= 95mph EV'},
  {key:'brl_bip_pct',  label:'BRL%',    d:1,  pct:true, invert:false,min:2, max:18,   tip:'Barrel % per BIP'},
  {key:'pull_brl_pct', label:'PBRL%',   d:1,  pct:true, invert:false,min:0, max:12,   tip:'Pulled barrel %'},
  {key:'fb_pct',       label:'FB%',     d:1,  pct:true, invert:false,min:20,max:50,   tip:'Fly ball %'},
  {key:'swstr_pct',    label:'SwStr%',  d:1,  pct:true, invert:true, min:5, max:18,   tip:'Swing-and-miss % (lower = better)'},
  {key:'la',           label:'LA',      d:1,  invert:false,min:5,    max:22,   tip:'Avg launch angle'},
  {key:'likely',       label:'LIKELY',  d:0,  invert:false,min:5,    max:40,   tip:'Projected HR pace per 162 G'},
];
var PITCHER_COLS = [
  {key:'pitcher_score',label:'PSCORE',  d:1,  invert:false,min:0,    max:100,  tip:'Pitcher dominance (higher=harder to HR off)'},
  {key:'era',          label:'ERA',     d:2,  invert:true, min:2.0,  max:6.5,  tip:'Earned Run Average'},
  {key:'whip',         label:'WHIP',    d:2,  invert:true, min:0.85, max:1.75, tip:'Walks+Hits per IP'},
  {key:'k9',           label:'K/9',     d:1,  invert:false,min:4,    max:14,   tip:'Strikeouts per 9 IP'},
  {key:'bb9',          label:'BB/9',    d:1,  invert:true, min:1,    max:5,    tip:'Walks per 9 IP'},
  {key:'fip',          label:'FIP',     d:2,  invert:true, min:2.0,  max:5.5,  tip:'Fielding Independent Pitching'},
  {key:'ip',           label:'IP',      d:1,  invert:false,min:10,   max:120,  tip:'Innings pitched (season)'},
  {key:'xwoba',        label:'xwOBA',   d:3,  invert:true, min:0.250,max:0.400,tip:'Expected wOBA allowed (Savant)'},
  {key:'csw_pct',      label:'CSW%',    d:1,  pct:true, invert:false,min:22,max:38,   tip:'Called Strike + Whiff %'},
  {key:'swstr_pct',    label:'SwStr%',  d:1,  pct:true, invert:false,min:5, max:18,   tip:'Swinging strike %'},
  {key:'hard_hit_pct', label:'HH%',     d:1,  pct:true, invert:true, min:28,max:52,   tip:'Hard-hit % allowed (lower=better)'},
  {key:'fb_pct',       label:'FB%',     d:1,  pct:true, invert:true, min:25,max:50,   tip:'Fly ball % allowed'},
];

function heatBg(value, col) {
  if (value === null || value === undefined || value === '') return '';
  var v = parseFloat(value);
  if (isNaN(v)) return '';
  var t = Math.max(0, Math.min(1, (v - col.min) / (col.max - col.min)));
  if (col.invert) t = 1 - t;
  var r, g, b = 60;
  if (t < 0.5) { r = 235; g = Math.round(80 + t * 2 * 155); }
  else { r = Math.round(235 - (t - 0.5) * 2 * 185); g = 210; }
  return 'background:rgba(' + r + ',' + g + ',' + b + ',0.55)';
}

function thClass(tbl, key) {
  var s = sortState[tbl];
  if (!s || s.col !== key) return '';
  return s.dir === 'asc' ? 'sort-asc' : 'sort-desc';
}
function sortClick(tbl, key) {
  var s = sortState[tbl];
  if (s && s.col === key) { s.dir = s.dir === 'asc' ? 'desc' : 'asc'; }
  else { sortState[tbl] = {col:key, dir:'desc'}; }
  renderMain();
}
function sortedRows(rows, tbl, defKey) {
  var s = sortState[tbl] || {col:defKey, dir:'desc'};
  return rows.slice().sort(function(a,b) {
    var av = a[s.col], bv = b[s.col];
    if (av == null) return 1; if (bv == null) return -1;
    var af = parseFloat(av), bf = parseFloat(bv);
    if (!isNaN(af) && !isNaN(bf)) return s.dir === 'asc' ? af - bf : bf - af;
    return s.dir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
}

function colTh(tbl, col) {
  var cls = thClass(tbl, col.key);
  return '<th class="' + cls + '" onclick="sortClick(\'' + tbl + '\',\'' + col.key + '\')">'
    + '<span class="tip" data-tip="' + esc(col.tip||col.label) + '">' + col.label + '</span>'
    + '<span class="sort-arrow"></span></th>';
}

function batterTable(batters, tbl) {
  if (!batters || !batters.length) return '<p style="color:#999;padding:8px">No batter data.</p>';
  var rows = sortedRows(batters, tbl, 'matchup_score');
  var h = '<div class="table-wrap"><table><thead><tr>';
  h += '<th class="' + thClass(tbl,'name') + '" onclick="sortClick(\'' + tbl + '\',\'name\')">BATTER <span class="sort-arrow"></span></th>';
  h += '<th class="' + thClass(tbl,'stands') + '" onclick="sortClick(\'' + tbl + '\',\'stands\')">B <span class="sort-arrow"></span></th>';
  BATTER_COLS.forEach(function(c){ h += colTh(tbl, c); });
  h += '<th>HR FORM</th></tr></thead><tbody>';
  rows.forEach(function(b) {
    h += '<tr><td>' + esc(b.name||'?') + '</td><td style="text-align:center">' + esc(b.stands||'R') + '</td>';
    BATTER_COLS.forEach(function(c) {
      var v = b[c.key];
      var bg = heatBg(v, c);
      var disp = (v === null || v === undefined || v === '') ? '—' : (c.pct ? fmtPct(v) : fmt(v, c.d));
      h += '<td style="' + bg + '">' + disp + '</td>';
    });
    var tc = b.hr_form_trend === 'up' ? 'trend-up' : b.hr_form_trend === 'down' ? 'trend-down' : '';
    h += '<td class="' + tc + '">' + esc(b.hr_form||'') + '</td></tr>';
  });
  h += '</tbody></table><div class="table-footer">' + rows.length + ' batters</div></div>';
  return h;
}

function pitcherTable(pitchers, tbl) {
  if (!pitchers || !pitchers.length) return '<p style="color:#999;padding:8px">No pitcher data.</p>';
  var rows = sortedRows(pitchers, tbl, 'pitcher_score');
  var h = '<div class="table-wrap"><table><thead><tr>';
  h += '<th class="' + thClass(tbl,'name') + '" onclick="sortClick(\'' + tbl + '\',\'name\')">PITCHER <span class="sort-arrow"></span></th>';
  h += '<th class="' + thClass(tbl,'team') + '" onclick="sortClick(\'' + tbl + '\',\'team\')">TEAM <span class="sort-arrow"></span></th>';
  h += '<th class="' + thClass(tbl,'opponentTeam') + '" onclick="sortClick(\'' + tbl + '\',\'opponentTeam\')">OPP <span class="sort-arrow"></span></th>';
  h += '<th class="' + thClass(tbl,'throws') + '" onclick="sortClick(\'' + tbl + '\',\'throws\')">T <span class="sort-arrow"></span></th>';
  PITCHER_COLS.forEach(function(c){ h += colTh(tbl, c); });
  h += '</tr></thead><tbody>';
  rows.forEach(function(p) {
    h += '<tr><td>' + esc(p.name||'TBD') + '</td><td>' + esc(p.team||'') + '</td><td>' + esc(p.opponentTeam||'') + '</td><td>' + esc(p.throws||'R') + '</td>';
    PITCHER_COLS.forEach(function(c) {
      var v = p[c.key];
      var bg = heatBg(v, c);
      var disp = (v === null || v === undefined || v === '') ? '—' : (c.pct ? fmtPct(v) : fmt(v, c.d));
      h += '<td style="' + bg + '">' + disp + '</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table><div class="table-footer">' + rows.length + ' pitchers</div></div>';
  return h;
}

function pitcherCard(pd, key) {
  var cur = pitcherCardTabs[key] || 'summary';
  var h = '<div class="card-sub-tabs">';
  [{id:'summary',lbl:'Summary'},{id:'arsenal',lbl:'Arsenal'},{id:'zones',lbl:'Zones'}].forEach(function(t){
    h += '<div class="card-sub-tab' + (cur===t.id?' active':'') + '" onclick="setPTab(\'' + key + '\',\'' + t.id + '\')">'+t.lbl+'</div>';
  });
  h += '</div>';

  if (cur === 'summary') {
    var sc = [
      {l:'ERA', v:pd?fmt(pd.era,2):'—'},
      {l:'WHIP',v:pd?fmt(pd.whip,2):'—'},
      {l:'K/9', v:pd?fmt(pd.k9,1):'—'},
      {l:'BB/9',v:pd?fmt(pd.bb9,1):'—'},
      {l:'FIP', v:pd?fmt(pd.fip,2):'—'},
      {l:'IP',  v:pd?fmt(pd.ip,1):'—'},
    ];
    h += '<div class="stat-grid">';
    sc.forEach(function(s){ h += '<div class="stat-item"><div class="stat-val">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>'; });
    h += '</div>';
    if (pd) {
      h += '<div class="pitch-detail">';
      if (pd.pitcher_score!=null) h += '<div>P.Score: <strong>'+fmt(pd.pitcher_score,1)+'</strong></div>';
      if (pd.xwoba!=null)         h += '<div>xwOBA: <strong>'+fmt(pd.xwoba,3)+'</strong></div>';
      if (pd.csw_pct!=null)       h += '<div>CSW%: <strong>'+fmtPct(pd.csw_pct)+'</strong></div>';
      if (pd.swstr_pct!=null)     h += '<div>SwStr%: <strong>'+fmtPct(pd.swstr_pct)+'</strong></div>';
      if (pd.hard_hit_pct!=null)  h += '<div>HH%: <strong>'+fmtPct(pd.hard_hit_pct)+'</strong></div>';
      h += '</div>';
    }
  } else if (cur === 'arsenal') {
    var ars = (pd && pd.arsenal) ? pd.arsenal : [];
    if (!ars.length) {
      h += '<div style="color:#999;font-size:11px;padding:8px 0">No arsenal data.</div>';
    } else {
      h += '<div class="table-wrap" style="margin:0"><table class="arsenal-table"><thead><tr>';
      ['PITCH','USE%','VELO','SPIN','RV/100','WHIFF%','xwOBA'].forEach(function(lbl,i){
        h += '<th'+(i===0?' style="text-align:left"':'')+'>'+lbl+'</th>';
      });
      h += '</tr></thead><tbody>';
      ars.forEach(function(p) {
        var rvbg = p.run_value!=null ? (p.run_value<0?'background:rgba(80,200,80,0.45)':p.run_value>0?'background:rgba(240,80,80,0.45)':'') : '';
        h += '<tr><td style="text-align:left">'+esc(p.pitch_name||p.abbrev||'?')+'</td>';
        h += '<td>'+(p.usage_pct!=null?parseFloat(p.usage_pct).toFixed(1)+'%':'—')+'</td>';
        h += '<td>'+(p.avg_speed!=null?parseFloat(p.avg_speed).toFixed(1):'—')+'</td>';
        h += '<td>'+(p.avg_spin!=null?Math.round(p.avg_spin):p.spin!=null?Math.round(p.spin):'—')+'</td>';
        h += '<td style="'+rvbg+'">'+(p.run_value!=null?parseFloat(p.run_value).toFixed(1):'—')+'</td>';
        h += '<td>'+(p.whiff_pct!=null&&p.whiff_pct!==0?parseFloat(p.whiff_pct).toFixed(1)+'%':'—')+'</td>';
        h += '<td>'+(p.xwoba!=null&&p.xwoba!==0?parseFloat(p.xwoba).toFixed(3):'—')+'</td>';
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }
  } else {
    var zones = (pd && pd.zones) ? pd.zones : [];
    h += zoneGrid(zones, pd ? pd.name+' (pitcher)' : 'Pitcher Zone');
  }
  return h;
}

function setPTab(key, tab) { pitcherCardTabs[key] = tab; renderMain(); }

function zoneGrid(zones, label) {
  if (!zones || zones.every(function(v){ return !v; })) return '<div style="color:#999;font-size:11px">No zone data</div>';
  var valid = zones.filter(function(v){ return v>0; });
  var mn = Math.min.apply(null, valid), mx = Math.max.apply(null, valid);
  var h = '<div><div class="zone-label">'+esc(label)+'</div><div class="zone-grid">';
  for (var i = 0; i < 9; i++) {
    var v = zones[i] || 0;
    var t = (mx > mn && v > 0) ? (v - mn) / (mx - mn) : 0;
    var bg = v > 0 ? heatBg(t, {min:0,max:1,invert:false}) : 'background:#f5f5f5';
    h += '<div class="zone-cell" style="'+bg+'">'+(v > 0 ? parseFloat(v).toFixed(2) : '')+'</div>';
  }
  h += '</div></div>';
  return h;
}

function exportCSV(batters, gameKey) {
  var hdr = ['Name','Stands','MScore','KHR','Ceiling','ZoneFit','xwOBAvP','ISO','HH%','BRL%','PullBRL%','FB%','SwStr%','LA','Likely','HRForm'];
  var rows = batters.map(function(b) {
    return [
      '"'+(b.name||'')+'"', b.stands||'R',
      b.matchup_score!=null?parseFloat(b.matchup_score).toFixed(2):'',
      b.khr!=null?parseFloat(b.khr).toFixed(1):'',
      b.ceiling!=null?parseFloat(b.ceiling).toFixed(1):'',
      b.zone_fit!=null?parseFloat(b.zone_fit).toFixed(3):'',
      b.xwobac!=null?parseFloat(b.xwobac).toFixed(3):'',
      b.iso!=null?parseFloat(b.iso).toFixed(3):'',
      b.hh_pct!=null?parseFloat(b.hh_pct).toFixed(1)+'%':'',
      b.brl_bip_pct!=null?parseFloat(b.brl_bip_pct).toFixed(1)+'%':'',
      b.pull_brl_pct!=null?parseFloat(b.pull_brl_pct).toFixed(1)+'%':'',
      b.fb_pct!=null?parseFloat(b.fb_pct).toFixed(1)+'%':'',
      b.swstr_pct!=null?parseFloat(b.swstr_pct).toFixed(1)+'%':'',
      b.la!=null?parseFloat(b.la).toFixed(1):'',
      b.likely!=null?parseInt(b.likely):'',
      b.hr_form||'',
    ].join(',');
  });
  var csv = [hdr.join(',')].concat(rows).join('\n');
  var blob = new Blob([csv],{type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='matchups-'+gameKey+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

function buildTabBar() {
  var games = gamesData();
  var h = '';
  h += '<div class="tab'+(activeTab==='slate'?' active':'')+'", onclick="setTab(\'slate\')">';
  h += '<div class="tab-teams">&#128202; Slate Summary</div></div>';
  games.forEach(function(g,i) {
    var id = 'game-'+i;
    var live = isGameLive(g);
    var liveBadge = live ? ' <span class="badge badge-live">LIVE</span>' : '';
    h += '<div class="tab'+(activeTab===id?' active':'')+(live?' tab-live':'')+'", onclick="setTab(\''+id+'\')">';
    h += '<div class="tab-teams">'+esc(g.awayTeam)+' @ '+esc(g.homeTeam)+liveBadge+'</div>';
    h += '<div class="tab-time">'+fmtTime(g.gameTime)+'</div></div>';
  });
  h += '<div class="tab'+(activeTab==='weather'?' active':'')+'", onclick="setTab(\'weather\')">'
  h += '<div class="tab-teams">&#127780; Weather</div></div>';
  document.getElementById('tab-bar').innerHTML = h;
}

function setTab(id) { activeTab = id; buildTabBar(); renderMain(); }

function slateView() {
  var ps = pitchersData();
  var games = gamesData();
  var allBatters = [];
  games.forEach(function(g){ (g.awayMatchups||[]).concat(g.homeMatchups||[]).forEach(function(b){ allBatters.push(b); }); });
  var h = '';
  h += '<h2 class="section-title">Top Slate Pitchers <span class="row-count">'+ps.length+' pitchers</span></h2>';
  h += pitcherTable(ps, 'slate-pitchers');
  h += '<h2 class="section-title">Top Slate Hitters <span class="row-count">'+allBatters.length+' rows</span></h2>';
  h += batterTable(allBatters, 'slate-batters');
  return h;
}

function weatherView() {
  var games = gamesData();
  var h = '<h2 class="section-title">&#127780; Weather Summary</h2>';
  if (!games.length) return h + '<p style="color:#999">No games.</p>';
  games.forEach(function(g) {
    var w = g.weather || {};
    var windO = isWindOut(w.wind_dir);
    h += '<div class="weather-card">';
    h += '<div style="font-weight:700;margin-bottom:4px">'+esc(g.awayTeam)+' @ '+esc(g.homeTeam)+' &mdash; '+esc(g.park||'')+(w.roof?' <span style="color:#666">[DOME]</span>':'')+' &mdash; '+fmtTime(g.gameTime)+'</div>';
    h += '<div style="font-size:12px">'+(w.temp_f!=null?w.temp_f+'&deg;F':'--')+'  '+(w.wind_mph!=null?w.wind_mph+' mph':'--')+' '+esc(w.wind_dir||'');
    if (windO) h += ' <span style="color:#2563eb;font-weight:700">&#128640; WIND OUT</span>';
    h += '  '+esc(w.condition||'')+'</div></div>';
  });
  return h;
}

function gameView(idx) {
  var games = gamesData();
  if (idx < 0 || idx >= games.length) return '<p style="color:red">Game not found.</p>';
  var g = games[idx];
  var gk = g.awayTeam+'@'+g.homeTeam;
  var live = isGameLive(g);
  var ps = pitchersData();
  var h = '';
  if (live) h += '<div class="live-strip">&#128308; GAME IN PROGRESS &mdash; data reflects pre-game projections</div>';

  h += '<h2 class="section-title">Pitcher Cards</h2><div class="cards-grid">';
  [{key:'away',pid:g.awayPitcherId,name:g.awayPitcherName,team:g.awayTeam},
   {key:'home',pid:g.homePitcherId,name:g.homePitcherName,team:g.homeTeam}].forEach(function(pi) {
    var pd = ps.find(function(p){ return p.pitcherId===pi.pid && p.team===pi.team; });
    var tk = gk+'-'+pi.key;
    h += '<div class="card"><div class="card-title">'+esc(pi.name||'TBD')+' ('+esc(pi.team)+')';
    if (pd && pd.throws) h += ' ['+esc(pd.throws)+']';
    h += '</div>'+pitcherCard(pd, tk)+'</div>';
  });
  h += '</div>';

  var awayTbl = 'g'+idx+'-away';
  h += '<div class="team-header"><span>'+esc(g.awayTeam)+' Batters vs '+esc(g.homePitcherName||'TBD')+(g.homeThrows?' ['+g.homeThrows+']':'')+' </span>';
  h += '<button class="export-btn" onclick="exportCSV(gamesData()['+idx+'].awayMatchups,\''+esc(gk)+'-away\')">&#11015; CSV</button></div>';
  h += batterTable(g.awayMatchups||[], awayTbl);

  var homeTbl = 'g'+idx+'-home';
  h += '<div class="team-header"><span>'+esc(g.homeTeam)+' Batters vs '+esc(g.awayPitcherName||'TBD')+(g.awayThrows?' ['+g.awayThrows+']':'')+' </span>';
  h += '<button class="export-btn" onclick="exportCSV(gamesData()['+idx+'].homeMatchups,\''+esc(gk)+'-home\')">&#11015; CSV</button></div>';
  h += batterTable(g.homeMatchups||[], homeTbl);
  return h;
}

function renderMain() {
  var el = document.getElementById('main-content');
  if (activeTab === 'slate') { el.innerHTML = slateView(); }
  else if (activeTab === 'weather') { el.innerHTML = weatherView(); }
  else {
    var idx = parseInt(activeTab.replace('game-',''), 10);
    el.innerHTML = gameView(isNaN(idx) ? 0 : idx);
  }
}

function updateWeatherBar() {
  var games = gamesData();
  var el = document.getElementById('weather-status');
  if (!el) return;
  el.textContent = games.slice(0,4).map(function(g) {
    var w = g.weather||{};
    return w.roof ? g.homeTeam+':DOME' : g.homeTeam+':'+(w.temp_f||'--')+'F '+(w.wind_mph||0)+'mph';
  }).join('  ·  ');
}

function toggleTheme() { document.body.classList.toggle('dark'); }

(function(){
  if (typeof MATCHUPS_DATE !== 'undefined') {
    document.getElementById('header-date').textContent =
      (typeof MATCHUPS_LABEL !== 'undefined' ? MATCHUPS_LABEL + '  ·  ' : '') + MATCHUPS_DATE;
  }
  buildTabBar();
  renderMain();
  updateWeatherBar();
})();
</script>
