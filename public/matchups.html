<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB HR Matchups — Statcast Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto Mono', monospace; font-size: 12px; background: #f5f5f5; color: #333; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header { background: #212529; color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header-logo { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .header-date { font-size: 13px; opacity: 0.9; }
    .header-nav { display: flex; gap: 12px; align-items: center; font-size: 11px; }
    .theme-btn { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }

    #tab-bar { background: #f0f0f0; border-bottom: 1px solid #ddd; padding: 8px; display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0; }
    .tab { background: white; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-size: 11px; line-height: 1.4; text-align: center; }
    .tab:hover { background: #e9ecef; }
    .tab.active { background: #495057; color: white; border-color: #495057; }
    .tab .tab-teams { font-weight: 700; font-size: 12px; }
    .tab .tab-time { font-size: 10px; opacity: 0.8; }
    .tab .tab-status { font-size: 10px; opacity: 0.7; }

    #main-content { flex: 1; overflow-y: auto; padding: 12px; }

    .section-title { font-size: 13px; font-weight: 700; margin: 12px 0 6px; color: #333; }
    .game-header { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; font-size: 12px; }
    .weather-line { font-size: 11px; color: #555; margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .badge-wind { background: #d4edda; color: #155724; }
    .badge-dome { background: #e2e3e5; color: #383d41; }

    .sub-tab-bar { display: flex; gap: 4px; margin-bottom: 10px; }
    .sub-tab { background: white; border: 1px solid #ccc; border-radius: 3px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    .sub-tab.active { background: #6c757d; color: white; border-color: #6c757d; }

    .side-toggle { display: flex; gap: 4px; margin-bottom: 8px; }
    .side-btn { background: white; border: 1px solid #ccc; border-radius: 3px; padding: 5px 14px; cursor: pointer; font-size: 11px; }
    .side-btn.active { background: #343a40; color: white; border-color: #343a40; }

    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    th { background: #f0f0f0; border: 1px solid #ccc; padding: 5px 8px; cursor: pointer; white-space: nowrap; text-align: right; font-weight: 600; user-select: none; }
    th:first-child, th:nth-child(2) { text-align: left; }
    th:hover { background: #e0e0e0; }
    td { border: 1px solid #e0e0e0; padding: 4px 8px; text-align: right; white-space: nowrap; }
    td:first-child { text-align: left; }
    tr:hover { background: rgba(0,0,0,0.03); }
    .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; }

    .sample-high { color: #1a7a2e; font-weight: 600; }
    .sample-medium { color: #555; }
    .sample-thin { color: #b06000; }
    .sample-very-thin { color: #c0392b; font-style: italic; }
    .legend { font-size: 10px; color: #666; margin: 4px 0 12px; }
    .trend-up { color: #1a7a2e; font-weight: bold; }
    .trend-down { color: #c0392b; font-weight: bold; }
    .trend-neutral { color: #888; }

    .pitcher-cards { display: flex; gap: 12px; margin: 8px 0; flex-wrap: wrap; }
    .pitcher-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; flex: 1; min-width: 280px; }
    .pitcher-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .pitcher-card-sub { font-size: 11px; color: #666; margin-bottom: 8px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; font-size: 11px; }
    .stat-item { text-align: center; }
    .stat-val { font-size: 16px; font-weight: 700; color: #333; }
    .stat-lbl { font-size: 9px; color: #888; text-transform: uppercase; }

    .zone-section { display: flex; gap: 20px; flex-wrap: wrap; margin: 8px 0; }
    .zone-map { text-align: center; }
    .zone-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #444; }
    .zone-na { color: #999; font-size: 11px; padding: 20px; border: 1px dashed #ccc; border-radius: 4px; }

    .batter-selector { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .batter-btn { background: white; border: 1px solid #ccc; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 11px; }
    .batter-btn.active { background: #495057; color: white; border-color: #495057; }

    .exports-area { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; }
    .exports-area textarea { width: 100%; height: 300px; font-family: monospace; font-size: 11px; border: 1px solid #ddd; padding: 6px; resize: vertical; }
    .copy-btn { margin-top: 8px; padding: 6px 16px; background: #495057; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }

    .error-msg { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 16px; text-align: center; color: #856404; }

    .card-sub-tabs { display: flex; gap: 3px; margin: 8px 0 6px; }
    .card-sub-tab { background: #f5f5f5; border: 1px solid #ddd; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 10px; }
    .card-sub-tab.active { background: #495057; color: white; border-color: #495057; }
    .card-tab-content { display: none; }
    .card-tab-content.active { display: block; }

    .sort-indicator { margin-left: 4px; font-size: 9px; }
    .zone-legend { display: flex; gap: 8px; align-items: center; font-size: 10px; margin-top: 8px; flex-wrap: wrap; }
    .zone-legend-item { display: flex; align-items: center; gap: 3px; }
    .zone-legend-swatch { width: 14px; height: 14px; border: 1px solid #ccc; display: inline-block; }

    .rolling-note { font-size: 10px; color: #888; font-style: italic; margin-bottom: 8px; }

    /* Dark theme */
    body.dark { background: #1a1a2e; color: #e0e0e0; }
    body.dark header { background: #0d0d1a; }
    body.dark #tab-bar { background: #16213e; border-color: #333; }
    body.dark .tab { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .tab:hover { background: #243b55; }
    body.dark .tab.active { background: #495057; color: white; }
    body.dark #main-content { background: #1a1a2e; }
    body.dark .section-title { color: #ddd; }
    body.dark .table-wrap { background: #16213e; border-color: #333; }
    body.dark table th { background: #243b55; border-color: #444; color: #ccc; }
    body.dark table td { border-color: #333; color: #ddd; }
    body.dark tr:hover { background: rgba(255,255,255,0.05); }
    body.dark .game-header { background: #16213e; border-color: #333; color: #ddd; }
    body.dark .sub-tab { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .side-btn { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .pitcher-card { background: #16213e; border-color: #333; }
    body.dark .pitcher-card-name { color: #eee; }
    body.dark .stat-val { color: #ddd; }
    body.dark .exports-area { background: #16213e; border-color: #333; }
    body.dark .exports-area textarea { background: #0d0d1a; color: #ccc; border-color: #444; }
    body.dark .batter-btn { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .card-sub-tab { background: #243b55; border-color: #444; color: #ccc; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-logo">&#9918; MATCHUPS</div>
      <div class="header-date" id="header-date"></div>
      <div class="header-nav">
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">Theme: Classic Light</button>
        <a href="parlays.html" style="color:rgba(255,255,255,0.7);text-decoration:none">HR Picks</a>
      </div>
    </header>
    <div id="tab-bar"></div>
    <div id="main-content"></div>
  </div>

  <script src="matchups_data.js"></script>
  <script>
  // ── State ──────────────────────────────────────────────────────────────────
  var state = {
    currentGame: null,
    subTab: 'matchup',
    side: 'away',
    selectedBatter: 0,
    sortCol: 'pitcher_score',
    sortDir: 'desc',
    slateTopHitterSort: 'matchup_score',
    slateTopHitterDir: 'desc',
    pitcherCardTab: {},   // pitcherId -> 'summary'|'arsenal'
    darkMode: false
  };

  // ── Theme ──────────────────────────────────────────────────────────────────
  function toggleTheme() {
    state.darkMode = !state.darkMode;
    document.body.classList.toggle('dark', state.darkMode);
    document.getElementById('theme-btn').textContent = state.darkMode ? 'Theme: Dark' : 'Theme: Classic Light';
  }

  // ── Format helpers ─────────────────────────────────────────────────────────
  function fmtPct(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return v.toFixed(1) + '%';
  }
  function fmtDec(v, d) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return v.toFixed(d);
  }
  function fmtOdds(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    var s = v.toFixed(3);
    return '.' + s.split('.')[1];
  }
  function fmtInt(v) {
    if (v === null || v === undefined || isNaN(v)) return '—';
    return Math.round(v).toString();
  }
  function safe(v) {
    return (v === null || v === undefined) ? '—' : v;
  }

  // ── Color helpers ──────────────────────────────────────────────────────────
  function getColumnColor(value, col) {
    var ranges = {
      matchup_score:    {lo:50,  hi:85,   hiGood:true},
      ceiling:          {lo:50,  hi:90,   hiGood:true},
      zone_fit:         {lo:0.06,hi:0.13, hiGood:true},
      khr:              {lo:55,  hi:75,   hiGood:true},
      iso:              {lo:0.130,hi:0.230,hiGood:true},
      xwoba:            {lo:0.290,hi:0.390,hiGood:true},
      xwobac:           {lo:0.290,hi:0.400,hiGood:true},
      swstr_pct:        {lo:8,   hi:16,   hiGood:false},
      pull_brl_pct:     {lo:3,   hi:9,    hiGood:true},
      brl_bip_pct:      {lo:6,   hi:16,   hiGood:true},
      fb_pct:           {lo:25,  hi:42,   hiGood:true},
      hh_pct:           {lo:35,  hi:55,   hiGood:true},
      la:               {lo:5,   hi:22,   hiGood:true},
      likely:           {lo:18,  hi:38,   hiGood:true},
      pitcher_score:    {lo:45,  hi:70,   hiGood:true},
      strikeout_score:  {lo:40,  hi:65,   hiGood:true},
      xwoba_pitcher:    {lo:0.270,hi:0.360,hiGood:false},
      hard_hit_pct_p:   {lo:35,  hi:48,   hiGood:false},
      csw_pct:          {lo:26,  hi:34,   hiGood:true},
      swstr_pct_p:      {lo:9,   hi:16,   hiGood:true},
      fb_pct_p:         {lo:28,  hi:45,   hiGood:true},
      ball_pct:         {lo:8,   hi:16,   hiGood:false},
      pulled_barrel_pct:{lo:3,   hi:9,    hiGood:false},
      oppo_pct:         {lo:15,  hi:30,   hiGood:false}
    };
    var r = ranges[col];
    if (!r || value === null || value === undefined || isNaN(value)) return '';
    var mid = (r.lo + r.hi) / 2;
    if (r.hiGood) {
      if (value >= r.hi) return 'background:#c8f5c8';
      if (value <= r.lo) return 'background:#ffc8c8';
      if (value >= mid) return 'background:#e8f8e8';
      return '';
    } else {
      if (value <= r.lo) return 'background:#c8f5c8';
      if (value >= r.hi) return 'background:#ffc8c8';
      if (value <= mid) return 'background:#e8f8e8';
      return '';
    }
  }

  // Percentile-based coloring for table columns (returns style string)
  function percentileColor(value, allValues, hiGood) {
    if (value === null || value === undefined || isNaN(value)) return '';
    var sorted = allValues.filter(function(v){ return v !== null && v !== undefined && !isNaN(v); }).slice().sort(function(a,b){return a-b;});
    if (sorted.length === 0) return '';
    var len = sorted.length;
    var p25 = sorted[Math.floor(len * 0.25)];
    var p75 = sorted[Math.floor(len * 0.75)];
    if (hiGood) {
      if (value >= p75) return 'background:#c8f5c8';
      if (value <= p25) return 'background:#ffc8c8';
    } else {
      if (value <= p25) return 'background:#c8f5c8';
      if (value >= p75) return 'background:#ffc8c8';
    }
    return '';
  }

  // ── Sort helper ────────────────────────────────────────────────────────────
  function sortBy(arr, key, dir) {
    return arr.slice().sort(function(a, b) {
      var av = a[key], bv = b[key];
      if (av === null || av === undefined) av = -Infinity;
      if (bv === null || bv === undefined) bv = -Infinity;
      if (dir === 'asc') return av > bv ? 1 : av < bv ? -1 : 0;
      return av < bv ? 1 : av > bv ? -1 : 0;
    });
  }

  // ── Game time formatter ────────────────────────────────────────────────────
  function fmtTime(gameTime) {
    if (!gameTime) return '';
    // Try to parse ISO string
    try {
      var d = new Date(gameTime);
      var h = d.getHours(), m = d.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      var h12 = h % 12 || 12;
      return h12 + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
    } catch(e) { return gameTime; }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    // Set header date
    var dateEl = document.getElementById('header-date');
    if (typeof MATCHUPS_LABEL !== 'undefined') {
      dateEl.textContent = MATCHUPS_LABEL;
    } else if (typeof MATCHUPS_DATE !== 'undefined') {
      dateEl.textContent = MATCHUPS_DATE;
    }

    if (typeof MATCHUPS_GAMES === 'undefined' || !MATCHUPS_GAMES || MATCHUPS_GAMES.length === 0) {
      document.getElementById('main-content').innerHTML = '<div class="error-msg">No matchup data available. Make sure matchups_data.js is loaded and contains MATCHUPS_GAMES.</div>';
      return;
    }

    renderTabBar();
    renderMain();
  }

  // ── Tab Bar ────────────────────────────────────────────────────────────────
  function renderTabBar() {
    var html = '';
    html += '<div class="tab' + (state.currentGame === null ? ' active' : '') + '" onclick="selectTab(null)"><div class="tab-teams">Slate Summary</div></div>';

    MATCHUPS_GAMES.forEach(function(g, i) {
      var t = fmtTime(g.gameTime);
      var active = state.currentGame === i ? ' active' : '';
      html += '<div class="tab' + active + '" onclick="selectTab(' + i + ')">';
      html += '<div class="tab-teams">' + esc(g.awayTeam) + ' @ ' + esc(g.homeTeam) + '</div>';
      if (t) html += '<div class="tab-time">' + esc(t) + '</div>';
      html += '<div class="tab-status">Scheduled</div>';
      html += '</div>';
    });

    document.getElementById('tab-bar').innerHTML = html;
  }

  function selectTab(idx) {
    state.currentGame = idx;
    state.subTab = 'matchup';
    state.side = 'away';
    state.selectedBatter = 0;
    renderTabBar();
    renderMain();
  }

  // ── Main render ────────────────────────────────────────────────────────────
  function renderMain() {
    if (state.currentGame === null) {
      renderSlateSummary();
    } else {
      renderGameView(state.currentGame);
    }
  }

  // ── Escape HTML ────────────────────────────────────────────────────────────
  function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Slate Summary ──────────────────────────────────────────────────────────
  function renderSlateSummary() {
    var mc = document.getElementById('main-content');
    var html = '';

    // Section 1: Pitcher table
    html += '<div class="section-title">Top projected arms across the slate</div>';
    html += renderPitcherSlateTable();

    // Section 2: Top Hitters
    html += '<div class="section-title">Top Slate Hitters</div>';
    html += renderTopHittersTable();

    mc.innerHTML = html;
  }

  function renderPitcherSlateTable() {
    if (typeof PITCHERS_SLATE === 'undefined' || !PITCHERS_SLATE || PITCHERS_SLATE.length === 0) {
      return '<div class="error-msg">No pitcher slate data available.</div>';
    }

    var data = sortBy(PITCHERS_SLATE, state.sortCol, state.sortDir);

    // Gather all values per column for percentile coloring
    var cols = ['pitcher_score','strikeout_score','xwoba','csw_pct','swstr_pct','ball_pct','pulled_barrel_pct','fb_pct','hard_hit_pct','oppo_pct'];
    var hiGoodMap = {
      pitcher_score: true, strikeout_score: true, csw_pct: true, swstr_pct: true, fb_pct: true,
      xwoba: false, ball_pct: false, pulled_barrel_pct: false, hard_hit_pct: false, oppo_pct: false
    };
    var colVals = {};
    cols.forEach(function(c) {
      colVals[c] = PITCHERS_SLATE.map(function(p){ return p[c]; });
    });

    var colDefs = [
      {key:'game',    label:'GAME',           sortKey:'game',             fmt: function(p){ return getGameLabel(p); }},
      {key:'name',    label:'PITCHER NAME',    sortKey:'name',             fmt: function(p){ return esc(p.name); }, left:true},
      {key:'throws',  label:'P THROWS',        sortKey:'throws',           fmt: function(p){ return esc(p.throws); }},
      {key:'pitcher_score',   label:'PITCHER SCORE',   sortKey:'pitcher_score',   fmt: function(p){ return fmtDec(p.pitcher_score, 3); }, col:'pitcher_score'},
      {key:'strikeout_score', label:'STRIKEOUT SCORE', sortKey:'strikeout_score', fmt: function(p){ return fmtDec(p.strikeout_score, 3); }, col:'strikeout_score'},
      {key:'xwoba',   label:'XWOBA',           sortKey:'xwoba',            fmt: function(p){ return fmtOdds(p.xwoba); }, col:'xwoba'},
      {key:'csw_pct', label:'CSW%',            sortKey:'csw_pct',          fmt: function(p){ return fmtPct(p.csw_pct); }, col:'csw_pct'},
      {key:'swstr_pct', label:'SWSTR%',        sortKey:'swstr_pct',        fmt: function(p){ return fmtPct(p.swstr_pct); }, col:'swstr_pct'},
      {key:'ball_pct', label:'BALL%',          sortKey:'ball_pct',         fmt: function(p){ return fmtPct(p.ball_pct); }, col:'ball_pct'},
      {key:'pulled_barrel_pct', label:'PULLED BARREL%', sortKey:'pulled_barrel_pct', fmt: function(p){ return fmtPct(p.pulled_barrel_pct); }, col:'pulled_barrel_pct'},
      {key:'fb_pct',  label:'FB%',             sortKey:'fb_pct',           fmt: function(p){ return fmtPct(p.fb_pct); }, col:'fb_pct'},
      {key:'hard_hit_pct', label:'HARD HIT%',  sortKey:'hard_hit_pct',     fmt: function(p){ return fmtPct(p.hard_hit_pct); }, col:'hard_hit_pct'},
      {key:'oppo_pct', label:'OPPO',           sortKey:'oppo_pct',         fmt: function(p){ return fmtPct(p.oppo_pct); }, col:'oppo_pct'}
    ];

    var html = '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    colDefs.forEach(function(cd) {
      var dir = (state.sortCol === cd.sortKey) ? state.sortDir : '';
      var arrow = dir === 'desc' ? ' ▼' : dir === 'asc' ? ' ▲' : '';
      var align = cd.left ? ' style="text-align:left"' : '';
      html += '<th' + align + ' onclick="sortPitcherTable(\'' + cd.sortKey + '\')">' + cd.label + '<span class="sort-indicator">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    data.forEach(function(p) {
      html += '<tr>';
      colDefs.forEach(function(cd) {
        var cellVal = cd.fmt(p);
        var style = '';
        if (cd.col) {
          var rawVal = p[cd.col];
          style = percentileColor(rawVal, colVals[cd.col], hiGoodMap[cd.col]);
        }
        var align = cd.left ? ' style="text-align:left;' + (style ? style.replace('background:','background-color:').replace('background','') : '') + '"' : (style ? ' style="' + style + '"' : '');
        if (cd.left && style) {
          html += '<td style="text-align:left;' + style.replace('background:','') + '">' + cellVal + '</td>';
        } else if (style) {
          html += '<td style="' + style + '">' + cellVal + '</td>';
        } else {
          html += '<td>' + cellVal + '</td>';
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  }

  function getGameLabel(p) {
    if (!p.gameKey) return esc(p.team) + ' vs ' + esc(p.opponentTeam);
    // Find game
    var game = MATCHUPS_GAMES.find(function(g){ return g.gamePk == p.gameKey || (g.awayTeam === p.team || g.homeTeam === p.team); });
    if (game) return esc(game.awayTeam) + '@' + esc(game.homeTeam);
    return esc(p.team) + ' vs ' + esc(p.opponentTeam);
  }

  function sortPitcherTable(col) {
    if (state.sortCol === col) {
      state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
    } else {
      state.sortCol = col;
      state.sortDir = 'desc';
    }
    renderMain();
  }

  function renderTopHittersTable() {
    // Gather top 10 batters across all games by matchup_score
    var allBatters = [];
    MATCHUPS_GAMES.forEach(function(g, gi) {
      var awayPName = g.awayPitcherName;
      var homePName = g.homePitcherName;
      (g.awayMatchups || []).forEach(function(b) {
        allBatters.push(Object.assign({}, b, {vsPitcher: homePName, gameIdx: gi, gameLabel: g.awayTeam + '@' + g.homeTeam}));
      });
      (g.homeMatchups || []).forEach(function(b) {
        allBatters.push(Object.assign({}, b, {vsPitcher: awayPName, gameIdx: gi, gameLabel: g.awayTeam + '@' + g.homeTeam}));
      });
    });

    var sorted = sortBy(allBatters, state.slateTopHitterSort, state.slateTopHitterDir).slice(0, 10);

    var topCols = [
      {key:'name',          label:'HITTER',      sortKey:'name',          fmt:function(b){ return esc(b.name); }, left:true},
      {key:'team',          label:'TEAM',         sortKey:'team',          fmt:function(b){ return esc(b.team); }, left:true},
      {key:'vsPitcher',     label:'VS PITCHER',   sortKey:'vsPitcher',     fmt:function(b){ return esc(b.vsPitcher); }, left:true},
      {key:'matchup_score', label:'MATCHUP',      sortKey:'matchup_score', fmt:function(b){ return fmtDec(b.matchup_score, 3); }, col:'matchup_score'},
      {key:'ceiling',       label:'CEILING',      sortKey:'ceiling',       fmt:function(b){ return fmtDec(b.ceiling, 3); }, col:'ceiling'},
      {key:'zone_fit',      label:'ZONE FIT',     sortKey:'zone_fit',      fmt:function(b){ return fmtDec(b.zone_fit, 3); }, col:'zone_fit'},
      {key:'khr',           label:'KHR',          sortKey:'khr',           fmt:function(b){ return fmtDec(b.khr, 3); }, col:'khr'},
      {key:'iso',           label:'ISO',          sortKey:'iso',           fmt:function(b){ return fmtDec(b.iso, 3); }, col:'iso'},
      {key:'xwoba',         label:'xWOBA',        sortKey:'xwoba',         fmt:function(b){ return fmtOdds(b.xwoba); }, col:'xwoba'},
      {key:'brl_bip_pct',   label:'BRL%',         sortKey:'brl_bip_pct',   fmt:function(b){ return fmtPct(b.brl_bip_pct); }, col:'brl_bip_pct'},
      {key:'hh_pct',        label:'HH%',          sortKey:'hh_pct',        fmt:function(b){ return fmtPct(b.hh_pct); }, col:'hh_pct'},
      {key:'likely',        label:'LIKELY',       sortKey:'likely',        fmt:function(b){ return fmtInt(b.likely); }, col:'likely'}
    ];

    var html = '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    topCols.forEach(function(cd) {
      var dir = (state.slateTopHitterSort === cd.sortKey) ? state.slateTopHitterDir : '';
      var arrow = dir === 'desc' ? ' ▼' : dir === 'asc' ? ' ▲' : '';
      var align = cd.left ? ' style="text-align:left"' : '';
      html += '<th' + align + ' onclick="sortTopHitters(\'' + cd.sortKey + '\')">' + cd.label + '<span class="sort-indicator">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    sorted.forEach(function(b) {
      html += '<tr>';
      topCols.forEach(function(cd) {
        var cellVal = cd.fmt(b);
        var style = '';
        if (cd.col) {
          style = getColumnColor(b[cd.col], cd.col);
        }
        if (cd.left && style) {
          html += '<td style="text-align:left;' + style + '">' + cellVal + '</td>';
        } else if (cd.left) {
          html += '<td style="text-align:left">' + cellVal + '</td>';
        } else if (style) {
          html += '<td style="' + style + '">' + cellVal + '</td>';
        } else {
          html += '<td>' + cellVal + '</td>';
        }
      });
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  }

  function sortTopHitters(col) {
    if (state.slateTopHitterSort === col) {
      state.slateTopHitterDir = state.slateTopHitterDir === 'desc' ? 'asc' : 'desc';
    } else {
      state.slateTopHitterSort = col;
      state.slateTopHitterDir = 'desc';
    }
    renderMain();
  }

  // ── Game View ──────────────────────────────────────────────────────────────
  function renderGameView(gameIdx) {

    var t = fmtTime(g.gameTime);
    var html = '';

    // Game header
    html += '<div class="game-header">';
    html += '<div>';
    html += '<strong>' + esc(g.awayTeam) + ' @ ' + esc(g.homeTeam) + '</strong>';
    html += ' &nbsp;|&nbsp; Scheduled';
    html += ' &nbsp;|&nbsp; Game PK: ' + esc(g.gamePk);
    if (t) html += ' &nbsp;|&nbsp; ' + esc(t);
    if (g.park) html += ' &nbsp;|&nbsp; ' + esc(g.park);
    if (g.parkHrRank) html += ' (HR Rank: ' + esc(g.parkHrRank) + ')';
    html += '</div>';
    html += '<div style="font-size:11px;color:#666">';
    html += esc(g.awayTeam) + ': <strong>' + esc(g.awayPitcherName || '—') + '</strong>';
    html += '&nbsp;&nbsp;';
    html += esc(g.homeTeam) + ': <strong>' + esc(g.homePitcherName || '—') + '</strong>';
    html += '</div>';
    html += '</div>';

    // Weather line
    if (g.weather) {
      var w = g.weather;
      html += '<div class="weather-line">';
      if (w.temp_f !== undefined && w.temp_f !== null) html += '<span>' + w.temp_f + '&#176;F</span>';
      if (w.wind_mph !== undefined && w.wind_mph !== null) {
        html += '<span>' + w.wind_mph + ' mph ' + esc(w.wind_dir || '') + '</span>';
        if (w.wind_mph >= 10) html += '<span class="badge badge-wind">&#128168; Wind Factor</span>';
      }
      if (w.condition) html += '<span>' + esc(w.condition) + '</span>';
      if (w.roof && (w.roof.toLowerCase() === 'dome' || w.roof.toLowerCase() === 'closed' || w.roof.toLowerCase() === 'retractable')) {
        html += '<span class="badge badge-dome">&#127968; ' + esc(w.roof) + '</span>';
      }
      html += '</div>';
    }

    // Sub-tabs
    var subTabs = [
      {id:'matchup', label:'Matchup'},
      {id:'rolling', label:'Rolling'},
      {id:'pitcher-zones', label:'Pitcher Zones'},
      {id:'hitter-zones', label:'Hitter Zones'},
      {id:'exports', label:'Exports'}
    ];
    html += '<div class="sub-tab-bar">';
    subTabs.forEach(function(st) {
      html += '<div class="sub-tab' + (state.subTab === st.id ? ' active' : '') + '" onclick="selectSubTab(\'' + st.id + '\',' + gameIdx + ')">' + st.label + '</div>';
    });
    html += '</div>';

    // Sub-tab content
    if (state.subTab === 'matchup') {
      html += renderMatchupSubTab(g, gameIdx);
    } else if (state.subTab === 'rolling') {
      html += renderRollingSubTab(g, gameIdx);
    } else if (state.subTab === 'pitcher-zones') {
      html += renderPitcherZonesSubTab(g, gameIdx);
    } else if (state.subTab === 'hitter-zones') {
      html += renderHitterZonesSubTab(g, gameIdx);
    } else if (state.subTab === 'exports') {
      html += renderExportsSubTab(g, gameIdx);
    }

    document.getElementById('main-content').innerHTML = html;

  function renderMatchupTable(matchups, pitcherId) {
    if (!matchups || matchups.length === 0) {
      return '<div class="error-msg">No matchup data for this side.</div>';
    }

    // Gather values for percentile coloring on MATCHUP and CEILING
    var matchupVals = matchups.map(function(b){ return b.matchup_score; });
    var ceilingVals = matchups.map(function(b){ return b.ceiling; });
    var pullBrlVals = matchups.map(function(b){ return b.pull_brl_pct; });
    var brlBipVals  = matchups.map(function(b){ return b.brl_bip_pct; });
    var fbVals      = matchups.map(function(b){ return b.fb_pct; });
    var hhVals      = matchups.map(function(b){ return b.hh_pct; });

    var html = '<div class="table-wrap"><table>';
    html += '<thead><tr>';
    var headers = ['HITTER NAME','MATCHUP','CEILING','ZONE FIT','KHR','HR FORM','PIT','BIP','ISO','xWOBA','xWOBAC','SWSTR%','PULLBRL%','BRL/BIP%','FB%','HH%','LA','LIKELY'];
    headers.forEach(function(h, i) {
      var align = i === 0 ? ' style="text-align:left"' : '';
      html += '<th' + align + '>' + h + '</th>';
    });
    html += '</tr></thead><tbody>';

    matchups.forEach(function(b) {
      var bip = b.bip || 0;
      var nameClass = bip > 300 ? 'sample-high' : bip >= 150 ? 'sample-medium' : bip >= 75 ? 'sample-thin' : 'sample-very-thin';

      // HR Form
      var hrFormVal = (b.hr_form !== null && b.hr_form !== undefined) ? fmtPct(b.hr_form) : '—';
      var trendIcon = '', trendClass = 'trend-neutral';
      if (b.hr_form_trend === 'up') { trendIcon = ' &#8679;'; trendClass = 'trend-up'; }
      else if (b.hr_form_trend === 'down') { trendIcon = ' &#8681;'; trendClass = 'trend-down'; }
      else { trendIcon = ' &#8594;'; trendClass = 'trend-neutral'; }
      var hrFormCell = hrFormVal + '<span class="' + trendClass + '">' + trendIcon + '</span>';

      // Color for various cells
      var mStyle  = percentileColor(b.matchup_score, matchupVals, true);
      var cStyle  = percentileColor(b.ceiling, ceilingVals, true);
      var zStyle  = b.zone_fit > 0.12 ? 'background:#c8f5c8' : b.zone_fit < 0.06 ? 'background:#ffc8c8' : '';
      var kStyle  = getColumnColor(b.khr, 'khr');
      var iStyle  = getColumnColor(b.iso, 'iso');
      var xwStyle = getColumnColor(b.xwoba, 'xwoba');
      var xcStyle = getColumnColor(b.xwobac, 'xwobac');
      var swStyle = getColumnColor(b.swstr_pct, 'swstr_pct');
      var pbStyle = percentileColor(b.pull_brl_pct, pullBrlVals, true);
      var bbStyle = percentileColor(b.brl_bip_pct, brlBipVals, true);
      var fbStyle = percentileColor(b.fb_pct, fbVals, true);
      var hhStyle = percentileColor(b.hh_pct, hhVals, true);
      var laVal = b.la;
      var laStyle = (laVal >= 10 && laVal <= 22) ? 'background:#c8f5c8' : (laVal < 5 || laVal > 28) ? 'background:#ffc8c8' : '';
      var liStyle = getColumnColor(b.likely, 'likely');

      html += '<tr>';
      html += '<td style="text-align:left"><span class="' + nameClass + '">' + esc(b.name) + '</span></td>';
      html += '<td' + (mStyle  ? ' style="' + mStyle  + '"' : '') + '>' + fmtDec(b.matchup_score, 3) + '</td>';
      html += '<td' + (cStyle  ? ' style="' + cStyle  + '"' : '') + '>' + fmtDec(b.ceiling, 3) + '</td>';
      html += '<td' + (zStyle  ? ' style="' + zStyle  + '"' : '') + '>' + fmtDec(b.zone_fit, 3) + '</td>';
      html += '<td' + (kStyle  ? ' style="' + kStyle  + '"' : '') + '>' + fmtDec(b.khr, 3) + '</td>';
      html += '<td>' + hrFormCell + '</td>';
      html += '<td>' + fmtInt(b.pit) + '</td>';
      html += '<td>' + fmtInt(b.bip) + '</td>';
      html += '<td' + (iStyle  ? ' style="' + iStyle  + '"' : '') + '>' + fmtDec(b.iso, 3) + '</td>';
      html += '<td' + (xwStyle ? ' style="' + xwStyle + '"' : '') + '>' + fmtOdds(b.xwoba) + '</td>';
      html += '<td' + (xcStyle ? ' style="' + xcStyle + '"' : '') + '>' + fmtOdds(b.xwobac) + '</td>';
      html += '<td' + (swStyle ? ' style="' + swStyle + '"' : '') + '>' + fmtPct(b.swstr_pct) + '</td>';
      html += '<td' + (pbStyle ? ' style="' + pbStyle + '"' : '') + '>' + fmtPct(b.pull_brl_pct) + '</td>';
      html += '<td' + (bbStyle ? ' style="' + bbStyle + '"' : '') + '>' + fmtPct(b.brl_bip_pct) + '</td>';
      html += '<td' + (fbStyle ? ' style="' + fbStyle + '"' : '') + '>' + fmtPct(b.fb_pct) + '</td>';
      html += '<td' + (hhStyle ? ' style="' + hhStyle + '"' : '') + '>' + fmtPct(b.hh_pct) + '</td>';
      html += '<td' + (laStyle ? ' style="' + laStyle + '"' : '') + '>' + (b.la !== null && b.la !== undefined ? fmtDec(b.la, 1) + '&#176;' : '—') + '</td>';
      html += '<td' + (liStyle ? ' style="' + liStyle + '"' : '') + '>' + fmtInt(b.likely) + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  }

  // ── Zone Heat Map ──────────────────────────────────────────────────────────
  function renderZoneHeatMap(zones, type, title) {
    // zones = array of 9 values (index 0=zone1 ... 8=zone9)
    // type = 'pitcher' (blue scale, pct) | 'batter' (cold-hot, xwoba)
    var cellSize = 80;
    var shadowSize = 40;
    var totalW = cellSize * 3 + shadowSize * 2;
    var totalH = cellSize * 3 + shadowSize * 2;

    // Check if all zeros / unavailable
    var allZero = !zones || zones.every(function(v){ return !v || v === 0; });

    var html = '<div class="zone-map">';
    html += '<div class="zone-title">' + esc(title) + '</div>';

    if (allZero) {
      html += '<div class="zone-na">Zone data unavailable</div>';
      html += '</div>';
      return html;
    }

    var maxPct = type === 'pitcher' ? Math.max.apply(null, zones.filter(function(v){return v;})) : 1;

    function getCellColor(val) {
      if (val === null || val === undefined || isNaN(val)) return '#f5f5f5';
      if (type === 'pitcher') {
        var ratio = maxPct > 0 ? val / maxPct : 0;
        var r = Math.round(21 + (227 - 21) * (1 - ratio));
        var gv = Math.round(101 + (242 - 101) * (1 - ratio));
        var b = Math.round(192 + (253 - 192) * (1 - ratio));
        return 'rgb(' + r + ',' + gv + ',' + b + ')';
      } else {
        // batter xwoba cold-hot
        if (val < 0.200) return '#2196f3';
        if (val < 0.300) return '#64b5f6';
        if (val < 0.380) return '#fff9c4';
        if (val < 0.450) return '#ff9800';
        return '#f44336';
      }
    }

    function fmtZoneVal(val) {
      if (val === null || val === undefined || isNaN(val)) return '';
      if (type === 'pitcher') return fmtPct(val);
      return fmtOdds(val);
    }

    var svgW = totalW;
    var svgH = totalH;
    html += '<svg width="' + svgW + '" height="' + svgH + '" style="border:1px solid #ccc;background:white">';

    // Draw shadow zones (outer ring) — simple border cells
    // Top row shadow
    for (var col = 0; col < 5; col++) {
      var x = col * shadowSize;
      html += '<rect x="' + x + '" y="0" width="' + shadowSize + '" height="' + shadowSize + '" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>';
      if (col === 0 || col === 4) {
        // corner
      } else {
        html += '<text x="' + (x + shadowSize/2) + '" y="' + (shadowSize/2 + 4) + '" text-anchor="middle" font-size="9" fill="#aaa">Shadow</text>';
      }
    }
    // Actually let me draw a clean layout:
    // SVG layout: shadow ring around 3x3 strike zone
    // Strike zone starts at (shadowSize, shadowSize), each cell is cellSize x cellSize
    // Shadow cells: top row, bottom row, left col, right col (each shadowSize wide)

    // Clear and redraw properly
    html = html.substring(0, html.lastIndexOf('<svg'));
    html += '<svg width="' + svgW + '" height="' + svgH + '" style="border:1px solid #ccc;background:#fafafa">';

    var ox = shadowSize; // origin x of strike zone
    var oy = shadowSize; // origin y of strike zone

    // Shadow top row (3 cells above strike zone)
    for (var sc = 0; sc < 3; sc++) {
      var sx = ox + sc * cellSize;
      html += '<rect x="' + sx + '" y="0" width="' + cellSize + '" height="' + shadowSize + '" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>';
      html += '<text x="' + (sx + cellSize/2) + '" y="' + (shadowSize/2 + 3) + '" text-anchor="middle" font-size="9" fill="#bbb">Shadow</text>';
    }
    // Shadow bottom row
    for (var sc = 0; sc < 3; sc++) {
      var sx = ox + sc * cellSize;
      var sy = oy + 3 * cellSize;
      html += '<rect x="' + sx + '" y="' + sy + '" width="' + cellSize + '" height="' + shadowSize + '" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>';
      html += '<text x="' + (sx + cellSize/2) + '" y="' + (sy + shadowSize/2 + 3) + '" text-anchor="middle" font-size="9" fill="#bbb">Shadow</text>';
    }
    // Shadow left col
    for (var sr = 0; sr < 3; sr++) {
      var sy = oy + sr * cellSize;
      html += '<rect x="0" y="' + sy + '" width="' + shadowSize + '" height="' + cellSize + '" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>';
      html += '<text x="' + (shadowSize/2) + '" y="' + (sy + cellSize/2 + 3) + '" text-anchor="middle" font-size="9" fill="#bbb">Shadow</text>';
    }
    // Shadow right col
    for (var sr = 0; sr < 3; sr++) {
      var sy = oy + sr * cellSize;
      var sx2 = ox + 3 * cellSize;
      html += '<rect x="' + sx2 + '" y="' + sy + '" width="' + shadowSize + '" height="' + cellSize + '" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>';
      html += '<text x="' + (sx2 + shadowSize/2) + '" y="' + (sy + cellSize/2 + 3) + '" text-anchor="middle" font-size="9" fill="#bbb">Shadow</text>';
    }
    // Corner patches
    html += '<rect x="0" y="0" width="' + shadowSize + '" height="' + shadowSize + '" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>';
    html += '<rect x="' + (ox + 3*cellSize) + '" y="0" width="' + shadowSize + '" height="' + shadowSize + '" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>';
    html += '<rect x="0" y="' + (oy + 3*cellSize) + '" width="' + shadowSize + '" height="' + shadowSize + '" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>';
    html += '<rect x="' + (ox + 3*cellSize) + '" y="' + (oy + 3*cellSize) + '" width="' + shadowSize + '" height="' + shadowSize + '" fill="#e8e8e8" stroke="#ddd" stroke-width="1"/>';

    // Strike zone 3x3 grid — zones 1-9
    // Zone layout: 1 2 3 (top), 4 5 6 (mid), 7 8 9 (bottom)
    for (var row = 0; row < 3; row++) {
      for (var col = 0; col < 3; col++) {
        var zoneNum = row * 3 + col; // 0-8
        var val = (zones && zones[zoneNum] !== undefined) ? zones[zoneNum] : null;
        var cx = ox + col * cellSize;
        var cy = oy + row * cellSize;
        var color = getCellColor(val);
        var textColor = type === 'batter' && val >= 0.380 ? '#fff' : '#333';

        html += '<rect x="' + cx + '" y="' + cy + '" width="' + cellSize + '" height="' + cellSize + '" fill="' + color + '" stroke="#999" stroke-width="1"/>';
        // Zone number (small, top-left)
        html += '<text x="' + (cx + 5) + '" y="' + (cy + 13) + '" font-size="10" fill="' + textColor + '" opacity="0.5">' + (zoneNum + 1) + '</text>';
        // Value (center)
        if (val !== null && val !== undefined && !isNaN(val) && val !== 0) {
          html += '<text x="' + (cx + cellSize/2) + '" y="' + (cy + cellSize/2 + 5) + '" text-anchor="middle" font-size="13" font-weight="600" fill="' + textColor + '">' + fmtZoneVal(val) + '</text>';
        }
      }
    }

    html += '</svg>';

    // Legend
    if (type === 'batter') {
      html += '<div class="zone-legend">';
      html += '<span style="font-size:10px;color:#666">Cold</span>';
      [['#2196f3','<.200'],['#64b5f6','.200-.300'],['#fff9c4','.300-.380'],['#ff9800','.380-.450'],['#f44336','>.450']].forEach(function(pair) {
        html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:' + pair[0] + '"></div><span>' + pair[1] + '</span></div>';
      });
      html += '<span style="font-size:10px;color:#666">Hot</span>';
      html += '</div>';
    } else {
      html += '<div class="zone-legend">';
      html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:#e3f2fd"></div><span>Low</span></div>';
      html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:#1565c0"></div><span>High</span></div>';
      html += '</div>';
    }

    html += '</div>'; // zone-map
    return html;
  }

  // ── Pitcher Zones Sub-tab ──────────────────────────────────────────────────
  function renderPitcherZonesSubTab(g, gameIdx) {
    var html = '<div class="section-title">Pitcher Zones — Pitch Location % (Season)</div>';
    html += '<div class="zone-section">';

    var pids = [g.awayPitcherId, g.homePitcherId];
    var pnames = [g.awayPitcherName, g.homePitcherName];

    pids.forEach(function(pid, i) {
      var pd = (typeof PITCHERS_BY_ID !== 'undefined' && PITCHERS_BY_ID && pid) ? PITCHERS_BY_ID[String(pid)] : null;
      var zones = pd && pd.zones ? pd.zones : null;
      var title = esc(pnames[i] || '—') + ' — Pitch Location % (Season)';
      html += renderZoneHeatMap(zones, 'pitcher', title);
    });

    html += '</div>';
    return html;
  }

  // ── Hitter Zones Sub-tab ───────────────────────────────────────────────────
  function renderHitterZonesSubTab(g, gameIdx) {
    var matchups = state.side === 'away' ? (g.awayMatchups || []) : (g.homeMatchups || []);

    var html = '';

    // Side toggle
    html += '<div class="side-toggle" style="margin-bottom:8px">';
    html += '<div class="side-btn' + (state.side === 'away' ? ' active' : '') + '" onclick="selectSide(\'away\',' + gameIdx + ')">' + esc(g.awayTeam) + ' Batters</div>';
    html += '<div class="side-btn' + (state.side === 'home' ? ' active' : '') + '" onclick="selectSide(\'home\',' + gameIdx + ')">' + esc(g.homeTeam) + ' Batters</div>';
    html += '</div>';

    html += '<div class="section-title">Hitter Zone Damage (xwOBA by Zone)</div>';

    if (!matchups || matchups.length === 0) {
      return html + '<div class="error-msg">No batter data available.</div>';
    }

    // Batter selector
    if (state.selectedBatter >= matchups.length) state.selectedBatter = 0;
    html += '<div class="batter-selector">';
    matchups.forEach(function(b, i) {
      html += '<div class="batter-btn' + (state.selectedBatter === i ? ' active' : '') + '" onclick="selectBatter(' + i + ',' + gameIdx + ')">' + esc(b.name) + '</div>';
    });
    html += '</div>';

    var batter = matchups[state.selectedBatter];
    var bd = (typeof BATTERS_BY_ID !== 'undefined' && BATTERS_BY_ID && batter) ? BATTERS_BY_ID[String(batter.batterId || '')] : null;
    var zones = bd && bd.zones ? bd.zones : (batter && batter.zones ? batter.zones : null);
    var title = batter ? esc(batter.name) + ' — xwOBA by Zone (Season)' : 'Select a batter';

    html += renderZoneHeatMap(zones, 'batter', title);

    return html;
  }

  function selectBatter(idx, gameIdx) {
    state.selectedBatter = idx;
    renderGameView(gameIdx);
  }

  // ── Exports Sub-tab ────────────────────────────────────────────────────────
  function renderExportsSubTab(g, gameIdx) {
    var allBatters = [];
    (g.awayMatchups || []).forEach(function(b) { allBatters.push(b); });
    (g.homeMatchups || []).forEach(function(b) { allBatters.push(b); });

    var header = 'Name,Team,Stands,Matchup,Ceiling,ZoneFit,KHR,HRForm,ISO,xWOBA,xWOBAC,SWSTR%,PullBrl%,BrlBIP%,FB%,HH%,LA,Likely';
    var rows = [header];

    allBatters.forEach(function(b) {
      var row = [
        csvEsc(b.name),
        csvEsc(b.team),
        csvEsc(b.stands),
        fmt3(b.matchup_score),
        fmt3(b.ceiling),
        fmt3(b.zone_fit),
        fmt3(b.khr),
        (b.hr_form !== null && b.hr_form !== undefined ? b.hr_form.toFixed(1) + '%' : ''),
        fmt3(b.iso),
        fmt3(b.xwoba),
        fmt3(b.xwobac),
        fmtPctRaw(b.swstr_pct),
        fmtPctRaw(b.pull_brl_pct),
        fmtPctRaw(b.brl_bip_pct),
        fmtPctRaw(b.fb_pct),
        fmtPctRaw(b.hh_pct),
        (b.la !== null && b.la !== undefined ? b.la.toFixed(1) : ''),
        (b.likely !== null && b.likely !== undefined ? Math.round(b.likely) : '')
      ];
      rows.push(row.join(','));
    });

    var csv = rows.join('\n');

    var html = '<div class="section-title">CSV Export</div>';
    html += '<div class="exports-area">';
    html += '<textarea id="csv-output" readonly>' + esc(csv) + '</textarea>';
    html += '<button class="copy-btn" onclick="copyCSV()">Copy CSV</button>';
    html += '</div>';
    return html;
  }

  function csvEsc(s) {
    if (s === null || s === undefined) return '';
    var str = String(s);
    if (str.indexOf(',') >= 0 || str.indexOf('"') >= 0 || str.indexOf('\n') >= 0) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  function fmt3(v) {
    if (v === null || v === undefined || isNaN(v)) return '';
    return v.toFixed(3);
  }

  function fmtPctRaw(v) {
    if (v === null || v === undefined || isNaN(v)) return '';
    return v.toFixed(1) + '%';
  }

  function copyCSV() {
    var ta = document.getElementById('csv-output');
    if (!ta) return;
    ta.select();
    try {
      document.execCommand('copy');
      var btn = document.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(function(){ btn.textContent = 'Copy CSV'; }, 2000); }
    } catch(e) {
      navigator.clipboard && navigator.clipboard.writeText(ta.value).then(function(){
        var btn = document.querySelector('.copy-btn');
        if (btn) { btn.textContent = 'Copied!'; setTimeout(function(){ btn.textContent = 'Copy CSV'; }, 2000); }
      });
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
