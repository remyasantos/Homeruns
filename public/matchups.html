<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB HR Matchups — Statcast Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto Mono', monospace; font-size: 12px; background: #f5f5f5; color: #333; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header { background: #212529; color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header-logo { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .header-date { font-size: 13px; opacity: 0.9; }
    .header-nav { display: flex; gap: 12px; align-items: center; font-size: 11px; }
    .theme-btn { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
    #weather-status { font-size: 10px; opacity: 0.55; }

    #tab-bar { background: #f0f0f0; border-bottom: 1px solid #ddd; padding: 8px; display: flex; gap: 6px; overflow-x: auto; flex-shrink: 0; }
    .tab { background: white; border: 1px solid #ccc; border-radius: 4px; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-size: 11px; line-height: 1.4; text-align: center; }
    .tab:hover { background: #e9ecef; }
    .tab.active { background: #495057; color: white; border-color: #495057; }
    .tab.tab-weather.active { background: #1565c0; border-color: #1565c0; }
    .tab .tab-teams { font-weight: 700; font-size: 12px; }
    .tab .tab-time { font-size: 10px; opacity: 0.8; }

    #main-content { flex: 1; overflow-y: auto; padding: 12px; }

    .section-title { font-size: 13px; font-weight: 700; margin: 14px 0 6px; color: #333; }
    .section-divider { border: none; border-top: 2px solid #dee2e6; margin: 18px 0 10px; }
    .game-header { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; font-size: 12px; }
    .weather-line { font-size: 11px; color: #555; margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; }
    .badge-wind { background: #d4edda; color: #155724; }
    .badge-dome { background: #e2e3e5; color: #383d41; }
    .badge-hot  { background: #f8d7da; color: #721c24; }
    .badge-cold { background: #cce5ff; color: #004085; }

    .sub-tab-bar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
    .sub-tab { background: white; border: 1px solid #ccc; border-radius: 3px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    .sub-tab.active { background: #6c757d; color: white; border-color: #6c757d; }

    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    th { background: #f0f0f0; border: 1px solid #ccc; padding: 5px 8px; cursor: pointer; white-space: nowrap; text-align: right; font-weight: 600; user-select: none; }
    th:first-child { text-align: left; }
    th:hover { background: #e0e0e0; }
    td { border: 1px solid #e0e0e0; padding: 4px 8px; text-align: right; white-space: nowrap; }
    td:first-child { text-align: left; }
    tr:hover { background: rgba(0,0,0,0.03); }
    .table-wrap { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 12px; }

    .sample-high       { color: #1a7a2e; font-weight: 600; }
    .sample-medium     { color: #555; }
    .sample-thin       { color: #b06000; }
    .sample-very-thin  { color: #c0392b; font-style: italic; }
    .legend { font-size: 10px; color: #666; margin: 4px 0 12px; }
    .trend-up      { color: #1a7a2e; font-weight: bold; }
    .trend-down    { color: #c0392b; font-weight: bold; }
    .trend-neutral { color: #888; }

    .pitcher-cards { display: flex; gap: 12px; margin: 8px 0 16px; flex-wrap: wrap; }
    .pitcher-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; flex: 1; min-width: 280px; }
    .pitcher-card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .pitcher-card-sub  { font-size: 11px; color: #666; margin-bottom: 8px; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; font-size: 11px; }
    .stat-item { text-align: center; }
    .stat-val { font-size: 16px; font-weight: 700; color: #333; }
    .stat-lbl { font-size: 9px; color: #888; text-transform: uppercase; }

    .zone-section { display: flex; gap: 20px; flex-wrap: wrap; margin: 8px 0 16px; }
    .zone-map { text-align: center; }
    .zone-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #444; }
    .zone-na { color: #999; font-size: 11px; padding: 20px; border: 1px dashed #ccc; border-radius: 4px; }

    .batter-selector { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
    .batter-btn { background: white; border: 1px solid #ccc; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 11px; }
    .batter-btn.active { background: #495057; color: white; border-color: #495057; }

    .exports-area { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 10px; }
    .exports-area textarea { width: 100%; height: 300px; font-family: monospace; font-size: 11px; border: 1px solid #ddd; padding: 6px; resize: vertical; }
    .copy-btn { margin-top: 8px; padding: 6px 16px; background: #495057; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }

    .error-msg { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 16px; text-align: center; color: #856404; }

    .card-sub-tabs { display: flex; gap: 3px; margin: 8px 0 6px; }
    .card-sub-tab { background: #f5f5f5; border: 1px solid #ddd; border-radius: 3px; padding: 3px 10px; cursor: pointer; font-size: 10px; }
    .card-sub-tab.active { background: #495057; color: white; border-color: #495057; }

    .sort-indicator { margin-left: 4px; font-size: 9px; }
    .zone-legend { display: flex; gap: 8px; align-items: center; font-size: 10px; margin-top: 6px; flex-wrap: wrap; }
    .zone-legend-item { display: flex; align-items: center; gap: 3px; }
    .zone-legend-swatch { width: 14px; height: 14px; border: 1px solid #ccc; display: inline-block; }
    .rolling-note { font-size: 10px; color: #888; font-style: italic; margin-bottom: 8px; }

    /* ── Weather tab ── */
    .weather-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; padding: 2px; }
    .weather-card { background: white; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .weather-card-hdr { background: #343a40; color: white; padding: 8px 12px; }
    .weather-card-game { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .weather-card-venue { font-size: 10px; opacity: 0.75; margin-top: 2px; }
    .weather-card-body { display: flex; gap: 0; }
    .weather-field-wrap { padding: 10px; background: #f8f9fa; border-right: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; }
    .weather-stats { padding: 10px 14px; flex: 1; display: flex; flex-direction: column; gap: 7px; justify-content: center; }
    .ws-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .ws-lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .ws-val { font-size: 14px; font-weight: 700; color: #333; }
    .ws-val.hot     { color: #c0392b; }
    .ws-val.cold    { color: #1565c0; }
    .ws-val.wind-strong   { color: #e65100; }
    .ws-val.wind-moderate { color: #f57f17; }
    .weather-card-badges { padding: 6px 12px 8px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #f0f0f0; background: #fafafa; min-height: 30px; align-items: center; }
    .weather-updated { font-size: 10px; color: #bbb; padding: 3px 12px 6px; }
    .weather-no-data { padding: 18px; text-align: center; color: #aaa; font-size: 11px; }

    /* ── Dark theme ── */
    body.dark { background: #1a1a2e; color: #e0e0e0; }
    body.dark header { background: #0d0d1a; }
    body.dark #tab-bar { background: #16213e; border-color: #333; }
    body.dark .tab { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .tab:hover { background: #243b55; }
    body.dark .tab.active { background: #495057; color: white; }
    body.dark .tab.tab-weather.active { background: #1565c0; }
    body.dark #main-content { background: #1a1a2e; }
    body.dark .section-title { color: #ddd; }
    body.dark .section-divider { border-color: #333; }
    body.dark .table-wrap { background: #16213e; border-color: #333; }
    body.dark table th { background: #243b55; border-color: #444; color: #ccc; }
    body.dark table td { border-color: #333; color: #ddd; }
    body.dark tr:hover { background: rgba(255,255,255,0.05); }
    body.dark .game-header { background: #16213e; border-color: #333; color: #ddd; }
    body.dark .sub-tab { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .pitcher-card { background: #16213e; border-color: #333; }
    body.dark .pitcher-card-name { color: #eee; }
    body.dark .stat-val { color: #ddd; }
    body.dark .exports-area { background: #16213e; border-color: #333; }
    body.dark .exports-area textarea { background: #0d0d1a; color: #ccc; border-color: #444; }
    body.dark .batter-btn { background: #1a1a2e; border-color: #444; color: #ccc; }
    body.dark .card-sub-tab { background: #243b55; border-color: #444; color: #ccc; }
    body.dark .weather-card { background: #16213e; border-color: #333; }
    body.dark .weather-card-hdr { background: #0d0d1a; }
    body.dark .weather-field-wrap { background: #1a1a2e; border-color: #333; }
    body.dark .weather-stats .ws-val { color: #ddd; }
    body.dark .weather-card-badges { background: #16213e; border-color: #333; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-logo">&#9918; KASPER MATCHUPS</div>
      <div class="header-date" id="header-date"></div>
      <div class="header-nav">
        <span id="weather-status"></span>
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">&#9728; Light</button>
        <a href="parlays.html" style="color:rgba(255,255,255,0.7);text-decoration:none;font-size:11px">HR Picks &#8594;</a>
      </div>
    </header>
    <div id="tab-bar"></div>
    <div id="main-content"></div>
  </div>

  <script src="matchups_data.js"></script>
  <script>
  // ── State ──────────────────────────────────────────────────────────────────
  var state = {
    currentTab: 'weather',   // 'weather' | 'slate' | number (game index)
    subTab: 'matchup',
    selectedAwayBatter: 0,
    selectedHomeBatter: 0,
    sortCol: 'pitcher_score',
    sortDir: 'desc',
    slateSort: 'matchup_score',
    slateSortDir: 'desc',
    awayBatterSort: 'matchup_score',
    awayBatterDir: 'desc',
    homeBatterSort: 'matchup_score',
    homeBatterDir: 'desc',
    pitcherCardTab: {},
    darkMode: false,
    liveWeather: {}   // gamePk -> {temp_f, wind_mph, wind_dir, condition, humidity, live:true}
  };

  // ── Team → city lookup for live weather ────────────────────────────────────
  var TEAM_CITY = {
    ARI:'Phoenix',ATL:'Atlanta',BAL:'Baltimore',BOS:'Boston',
    CHC:'Chicago',CWS:'Chicago',CIN:'Cincinnati',CLE:'Cleveland',
    COL:'Denver',DET:'Detroit',HOU:'Houston',KC:'Kansas City',
    LAA:'Anaheim',LAD:'Los Angeles',MIA:'Miami',MIL:'Milwaukee',
    MIN:'Minneapolis',NYM:'New York',NYY:'New York',OAK:'Oakland',
    PHI:'Philadelphia',PIT:'Pittsburgh',SD:'San Diego',SF:'San Francisco',
    SEA:'Seattle',STL:'St Louis',TB:'St. Petersburg',TEX:'Arlington',
    TOR:'Toronto',WSH:'Washington'
  };

  // ── Theme ──────────────────────────────────────────────────────────────────
  function toggleTheme() {
    state.darkMode = !state.darkMode;
    document.body.classList.toggle('dark', state.darkMode);
    document.getElementById('theme-btn').textContent = state.darkMode ? '☽ Dark' : '☀ Light';
  }

  // ── Format helpers ─────────────────────────────────────────────────────────
  function fmtPct(v)  { if (v == null || isNaN(v)) return '—'; return v.toFixed(1) + '%'; }
  function fmtDec(v,d){ if (v == null || isNaN(v)) return '—'; return v.toFixed(d); }
  function fmtOdds(v) { if (v == null || isNaN(v)) return '—'; return '.' + v.toFixed(3).split('.')[1]; }
  function fmtInt(v)  { if (v == null || isNaN(v)) return '—'; return Math.round(v).toString(); }
  function safe(v)    { return (v == null) ? '—' : v; }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Color helpers ──────────────────────────────────────────────────────────
  function percentileColor(value, allValues, hiGood) {
    if (value == null || isNaN(value)) return '';
    var sorted = allValues.filter(function(v){ return v != null && !isNaN(v); }).slice().sort(function(a,b){return a-b;});
    if (!sorted.length) return '';
    var p25 = sorted[Math.floor(sorted.length * 0.25)];
    var p75 = sorted[Math.floor(sorted.length * 0.75)];
    if (hiGood) {
      if (value >= p75) return 'background:#c8f5c8';
      if (value <= p25) return 'background:#ffc8c8';
    } else {
      if (value <= p25) return 'background:#c8f5c8';
      if (value >= p75) return 'background:#ffc8c8';
    }
    return '';
  }

  function getColumnColor(value, col) {
    var ranges = {
      matchup_score:   {lo:50,  hi:85,   hiGood:true},
      ceiling:         {lo:50,  hi:90,   hiGood:true},
      zone_fit:        {lo:0.06,hi:0.13, hiGood:true},
      khr:             {lo:55,  hi:75,   hiGood:true},
      iso:             {lo:0.130,hi:0.230,hiGood:true},
      xwoba:           {lo:0.290,hi:0.390,hiGood:true},
      xwobac:          {lo:0.290,hi:0.400,hiGood:true},
      swstr_pct:       {lo:8,   hi:16,   hiGood:false},
      pull_brl_pct:    {lo:3,   hi:9,    hiGood:true},
      brl_bip_pct:     {lo:6,   hi:16,   hiGood:true},
      fb_pct:          {lo:25,  hi:42,   hiGood:true},
      hh_pct:          {lo:35,  hi:55,   hiGood:true},
      la:              {lo:5,   hi:22,   hiGood:true},
      likely:          {lo:18,  hi:38,   hiGood:true},
      pitcher_score:   {lo:45,  hi:70,   hiGood:true},
      strikeout_score: {lo:40,  hi:65,   hiGood:true},
      xwoba_pitcher:   {lo:0.270,hi:0.360,hiGood:false},
      hard_hit_pct:    {lo:35,  hi:48,   hiGood:false},
      csw_pct:         {lo:26,  hi:34,   hiGood:true},
      swstr_pct_p:     {lo:9,   hi:16,   hiGood:true},
      fb_pct_p:        {lo:28,  hi:45,   hiGood:true},
      ball_pct:        {lo:8,   hi:16,   hiGood:false},
      pulled_barrel_pct:{lo:3,  hi:9,    hiGood:false},
      oppo_pct:        {lo:15,  hi:30,   hiGood:false}
    };
    var r = ranges[col];
    if (!r || value == null || isNaN(value)) return '';
    var mid = (r.lo + r.hi) / 2;
    if (r.hiGood) {
      if (value >= r.hi)  return 'background:#c8f5c8';
      if (value <= r.lo)  return 'background:#ffc8c8';
      if (value >= mid)   return 'background:#e8f8e8';
    } else {
      if (value <= r.lo)  return 'background:#c8f5c8';
      if (value >= r.hi)  return 'background:#ffc8c8';
      if (value <= mid)   return 'background:#e8f8e8';
    }
    return '';
  }

  function tdStyle(style, left) {
    var s = (left ? 'text-align:left;' : '') + (style ? style.replace('background:','background-color:') : '');
    return s ? ' style="' + s.replace('background-color:','background:') + '"' : (left ? ' style="text-align:left"' : '');
  }

  // ── Sort helper ────────────────────────────────────────────────────────────
  function sortBy(arr, key, dir) {
    return arr.slice().sort(function(a,b){
      var av = a[key], bv = b[key];
      if (av == null) av = -Infinity;
      if (bv == null) bv = -Infinity;
      return dir === 'asc' ? (av > bv ? 1 : av < bv ? -1 : 0) : (av < bv ? 1 : av > bv ? -1 : 0);
    });
  }

  function fmtTime(t) {
    if (!t) return '';
    try {
      var d = new Date(t), h = d.getHours(), m = d.getMinutes();
      return (h%12||12) + ':' + (m<10?'0':'')+m + (h>=12?' PM':' AM');
    } catch(e){ return t; }
  }

  // ── Wind direction helpers ─────────────────────────────────────────────────
  function windDirFromDeg(dir) {
    if (dir == null) return null;
    dir = String(dir).trim().toUpperCase();
    var map = {N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,
               S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
    if (map[dir] !== undefined) return map[dir];
    var n = parseFloat(dir);
    if (!isNaN(n)) return n;
    if (dir.indexOf('OUT')>=0 && dir.indexOf('CF')>=0) return 180; // FROM home = coming from S in baseball
    if (dir.indexOf('IN')>=0  && dir.indexOf('CF')>=0) return 0;
    if (dir.indexOf('OUT')>=0 && dir.indexOf('LF')>=0) return 135;
    if (dir.indexOf('OUT')>=0 && dir.indexOf('RF')>=0) return 225;
    return null;
  }

  // Returns SVG arrow group pointing in direction wind is blowing TO
  function renderWindArrowSVG(windDir, windMph) {
    var fromDeg = windDirFromDeg(windDir);
    if (fromDeg === null || !windMph) return '';
    var toDeg = (fromDeg + 180) % 360;
    var color = windMph >= 12 ? '#e65100' : windMph >= 7 ? '#f57f17' : '#78909c';
    var cx = 75, cy = 60;
    var len = 22;
    return [
      '<g transform="rotate(' + toDeg + ',' + cx + ',' + cy + ')" opacity="0.9">',
      '<line x1="' + cx + '" y1="' + (cy+len/2) + '" x2="' + cx + '" y2="' + (cy-len/2) + '"',
      ' stroke="' + color + '" stroke-width="3" stroke-linecap="round"/>',
      '<polygon points="' + cx + ',' + (cy-len/2-7) + ' ' + (cx-5) + ',' + (cy-len/2+2) + ' ' + (cx+5) + ',' + (cy-len/2+2) + '"',
      ' fill="' + color + '"/>',
      '</g>'
    ].join('');
  }

  // ── Baseball field SVG ─────────────────────────────────────────────────────
  function renderFieldSVG(windDir, windMph) {
    var arrow = renderWindArrowSVG(windDir, windMph);
    return [
      '<svg width="150" height="130" viewBox="0 0 150 130" style="display:block">',
      // Outfield grass
      '<path d="M 75,112 L 10,52 Q 75,4 140,52 Z" fill="#2e7d32" opacity="0.75"/>',
      // Warning track
      '<path d="M 75,112 L 14,55 Q 75,7 136,55 Z" fill="none" stroke="#c4954a" stroke-width="4" opacity="0.4"/>',
      // Infield dirt
      '<polygon points="75,110 23,70 75,30 127,70" fill="#c4954a" opacity="0.85"/>',
      // Infield grass
      '<polygon points="75,96 40,70 75,44 110,70" fill="#388e3c" opacity="0.9"/>',
      // Pitcher mound
      '<circle cx="75" cy="70" r="5" fill="#b8863c" stroke="#8a6028" stroke-width="1"/>',
      // Baselines
      '<line x1="75" y1="110" x2="23" y2="70" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>',
      '<line x1="75" y1="110" x2="127" y2="70" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>',
      // Bases
      '<rect x="72" y="107" width="6" height="6" fill="white" stroke="#555" stroke-width="0.5"/>',
      '<rect x="72" y="27" width="6" height="6" fill="white" stroke="#555" stroke-width="0.5"/>',
      '<rect x="19" y="67" width="6" height="6" fill="white" stroke="#555" stroke-width="0.5" transform="rotate(45,22,70)"/>',
      '<rect x="123" y="67" width="6" height="6" fill="white" stroke="#555" stroke-width="0.5" transform="rotate(45,126,70)"/>',
      // Wind arrow
      arrow,
      // CF / Home labels
      '<text x="75" y="19" text-anchor="middle" font-size="9" fill="white" opacity="0.7" font-family="monospace">CF</text>',
      '<text x="75" y="126" text-anchor="middle" font-size="9" fill="#666" font-family="monospace">HOME</text>',
      '</svg>'
    ].join('');
  }

  // ── Weather card for one game ──────────────────────────────────────────────
  function renderWeatherCard(g, liveW) {
    var w = liveW || g.weather || {};
    var hasData = w.temp_f != null || w.wind_mph != null || w.condition;
    var isDome = w.roof && /dome|closed|retract/i.test(w.roof);

    var tempVal = w.temp_f != null ? w.temp_f + '&#176;F' : '—';
    var tempClass = w.temp_f >= 85 ? 'hot' : w.temp_f <= 52 ? 'cold' : '';
    var windVal = w.wind_mph != null ? (w.wind_mph + ' mph' + (w.wind_dir ? ' ' + w.wind_dir : '')) : '—';
    var windClass = w.wind_mph >= 12 ? 'wind-strong' : w.wind_mph >= 7 ? 'wind-moderate' : '';
    var humidity = w.humidity != null ? (w.humidity + '%') : '—';

    var badges = '';
    if (isDome) badges += '<span class="badge badge-dome">&#127968; DOME — No Weather</span>';
    else {
      if (w.wind_mph >= 12) badges += '<span class="badge badge-wind">&#128168; WIND FACTOR</span>';
      if (w.temp_f >= 85)   badges += '<span class="badge badge-hot">&#x1F525; HOT</span>';
      if (w.temp_f <= 52)   badges += '<span class="badge badge-cold">&#x1F9CA; COLD</span>';
    }
    if (liveW && liveW.live) badges += '<span style="font-size:10px;color:#1565c0;margin-left:4px">&#x25CF; LIVE</span>';

    var gameLabel = esc(g.awayTeam) + ' @ ' + esc(g.homeTeam);
    var venueLabel = esc(g.venueName || g.park || '');
    var gameTime = g.gameTime ? (' &nbsp;&#183;&nbsp; ' + fmtTime(g.gameTime)) : '';

    var fieldSvg = isDome
      ? '<div style="width:150px;height:130px;display:flex;align-items:center;justify-content:center;background:#e8e8e8;border-radius:4px;font-size:10px;color:#888;text-align:center">DOME<br>No Wind</div>'
      : renderFieldSVG(w.wind_dir, w.wind_mph);

    var html = '<div class="weather-card">';
    html += '<div class="weather-card-hdr">';
    html += '<div class="weather-card-game">' + gameLabel + gameTime + '</div>';
    if (venueLabel) html += '<div class="weather-card-venue">' + venueLabel + '</div>';
    html += '</div>';

    if (!hasData) {
      html += '<div class="weather-no-data">Weather data unavailable</div>';
    } else {
      html += '<div class="weather-card-body">';
      html += '<div class="weather-field-wrap">' + fieldSvg + '</div>';
      html += '<div class="weather-stats">';
      html += '<div class="ws-row"><span class="ws-lbl">TEMP</span><span class="ws-val ' + tempClass + '">' + tempVal + '</span></div>';
      html += '<div class="ws-row"><span class="ws-lbl">WIND</span><span class="ws-val ' + windClass + '">' + windVal + '</span></div>';
      html += '<div class="ws-row"><span class="ws-lbl">HUMIDITY</span><span class="ws-val">' + humidity + '</span></div>';
      if (w.condition) html += '<div class="ws-row"><span class="ws-lbl">COND</span><span class="ws-val" style="font-size:11px">' + esc(w.condition) + '</span></div>';
      html += '</div>'; // weather-stats
      html += '</div>'; // weather-card-body
    }

    if (badges) html += '<div class="weather-card-badges">' + badges + '</div>';
    html += '</div>'; // weather-card
    return html;
  }

  // ── Weather Tab ────────────────────────────────────────────────────────────
  function renderWeatherTab() {
    var mc = document.getElementById('main-content');
    if (typeof MATCHUPS_GAMES === 'undefined' || !MATCHUPS_GAMES.length) {

  // ── Init & live weather fetch ──────────────────────────────────────────────
  function init() {
    var dateEl = document.getElementById('header-date');
    if (typeof MATCHUPS_LABEL !== 'undefined') dateEl.textContent = MATCHUPS_LABEL;
    else if (typeof MATCHUPS_DATE !== 'undefined') dateEl.textContent = MATCHUPS_DATE;

    if (typeof MATCHUPS_GAMES === 'undefined' || !MATCHUPS_GAMES || !MATCHUPS_GAMES.length) {
      document.getElementById('main-content').innerHTML = '<div class="error-msg">No matchup data available. Check that matchups_data.js is loaded.</div>';
      return;
    }

    renderTabBar();
    renderMain();
    fetchLiveWeather();
  }

  function fetchLiveWeather() {
    if (typeof MATCHUPS_GAMES === 'undefined') return;
    var statusEl = document.getElementById('weather-status');
    statusEl.textContent = '⟳ weather...';
    var pending = 0, fetched = 0;
    MATCHUPS_GAMES.forEach(function(g) {
      var location = g.venueName || TEAM_CITY[g.homeTeam] || g.homeTeam;
      if (!location) return;
      pending++;
      fetch('https://wttr.in/' + encodeURIComponent(location) + '?format=j1')
        .then(function(r){ return r.json(); })
        .then(function(data){
          var c = data && data.current_condition && data.current_condition[0];
          if (c) {
            state.liveWeather[g.gamePk || g.homeTeam] = {
              temp_f:    parseInt(c.temp_F),
              wind_mph:  parseInt(c.windspeedMiles),
              wind_dir:  c.winddir16Point,
              condition: c.weatherDesc && c.weatherDesc[0] && c.weatherDesc[0].value,
              humidity:  parseInt(c.humidity),
              roof:      (g.weather && g.weather.roof) || null,
              live:      true
            };
            fetched++;
          }
          if (--pending === 0) finishWeatherFetch(fetched);
        })
        .catch(function(){
          if (--pending === 0) finishWeatherFetch(fetched);
        });
    });
    if (!pending) statusEl.textContent = '';
  }

  function finishWeatherFetch(count) {
    var statusEl = document.getElementById('weather-status');
    statusEl.textContent = count > 0 ? ('&#x25CF; ' + count + ' live') : '';
    if (state.currentTab === 'weather') renderMain();
  }

  // ── Tab Bar ────────────────────────────────────────────────────────────────
  function renderTabBar() {
    var html = '';
    html += '<div class="tab tab-weather' + (state.currentTab === 'weather' ? ' active' : '') + '" onclick="selectTab(\'weather\')"><div class="tab-teams">&#127783; Weather</div></div>';
    html += '<div class="tab' + (state.currentTab === 'slate' ? ' active' : '') + '" onclick="selectTab(\'slate\')"><div class="tab-teams">Slate Summary</div></div>';
    MATCHUPS_GAMES.forEach(function(g, i) {
      var t = fmtTime(g.gameTime);
      html += '<div class="tab' + (state.currentTab === i ? ' active' : '') + '" onclick="selectTab(' + i + ')">';
      html += '<div class="tab-teams">' + esc(g.awayTeam) + ' @ ' + esc(g.homeTeam) + '</div>';
      if (t) html += '<div class="tab-time">' + t + '</div>';
      html += '</div>';
    });
    document.getElementById('tab-bar').innerHTML = html;
  }

  function selectTab(id) {
    state.currentTab = id;
    state.subTab = 'matchup';

    state.selectedHomeBatter = 0;

      {k:'xwoba',           lbl:'xWOBA',           s:'xwoba',           fmt:function(p){ return fmtOdds(p.xwoba); }, col:'xwoba'},
      {k:'csw_pct',         lbl:'CSW%',            s:'csw_pct',         fmt:function(p){ return fmtPct(p.csw_pct); }, col:'csw_pct'},
      {k:'swstr_pct',       lbl:'SWSTR%',          s:'swstr_pct',       fmt:function(p){ return fmtPct(p.swstr_pct); }, col:'swstr_pct'},
      {k:'ball_pct',        lbl:'BALL%',           s:'ball_pct',        fmt:function(p){ return fmtPct(p.ball_pct); }, col:'ball_pct'},
      {k:'pulled_barrel_pct',lbl:'PULL.BRL%',      s:'pulled_barrel_pct',fmt:function(p){ return fmtPct(p.pulled_barrel_pct); }, col:'pulled_barrel_pct'},
      {k:'fb_pct',          lbl:'FB%',             s:'fb_pct',          fmt:function(p){ return fmtPct(p.fb_pct); }, col:'fb_pct'},
      {k:'hard_hit_pct',    lbl:'HARD.HIT%',       s:'hard_hit_pct',    fmt:function(p){ return fmtPct(p.hard_hit_pct); }, col:'hard_hit_pct'},

    if (!p.gameKey && !p.team) return '—';

  function sortTopHitters(col) {

  // ── Game View ──────────────────────────────────────────────────────────────

    var html = '';

    html += '<div class="game-header"><div>';
    html += '<strong>' + esc(g.awayTeam) + ' @ ' + esc(g.homeTeam) + '</strong>';
    if (t)         html += ' &nbsp;|&nbsp; ' + esc(t);
    if (g.park)    html += ' &nbsp;|&nbsp; ' + esc(g.park);
    if (g.parkHrRank) html += ' (HR Park Rank: ' + esc(g.parkHrRank) + ')';
    html += '</div><div style="font-size:11px;color:#888">';
    html += esc(g.awayTeam) + ': <strong>' + esc(g.awayPitcherName||'TBD') + '</strong>';

    html += esc(g.homeTeam) + ': <strong>' + esc(g.homePitcherName||'TBD') + '</strong>';

      var w = g.weather;
      html += '<div class="weather-line">';

      if (w.wind_mph != null) {
        html += '<span>' + w.wind_mph + ' mph ' + esc(w.wind_dir||'') + '</span>';
        if (w.wind_mph >= 10) html += '<span class="badge badge-wind">&#128168; Wind Factor</span>';
      }
      if (w.condition) html += '<span>' + esc(w.condition) + '</span>';
      if (w.roof && /dome|closed|retract/i.test(w.roof)) html += '<span class="badge badge-dome">&#127968; ' + esc(w.roof) + '</span>';

    var subTabs = [{id:'matchup',label:'Matchup'},{id:'rolling',label:'Rolling'},{id:'pitcher-zones',label:'Pitcher Zones'},{id:'hitter-zones',label:'Hitter Zones'},{id:'exports',label:'Exports'}];

    });

    else if (state.subTab === 'pitcher-zones') html += renderPitcherZonesSubTab(g, gameIdx);
    else if (state.subTab === 'hitter-zones')  html += renderHitterZonesSubTab(g, gameIdx);
    else if (state.subTab === 'exports')       html += renderExportsSubTab(g, gameIdx);

    document.getElementById('main-content').innerHTML = html;

    state.subTab = tabId;
    state.selectedAwayBatter = 0;
    state.selectedHomeBatter = 0;
    renderGameView(gameIdx);
  }

  // ── Matchup Sub-tab (both teams on same page) ──────────────────────────────
  function renderMatchupSubTab(g, gameIdx) {
    var awayMatchups = g.awayMatchups || [];
    var homeMatchups = g.homeMatchups || [];
    var html = '';

    // Best Matchups — combined top 6
    var combined = [];
    awayMatchups.forEach(function(b){ combined.push(Object.assign({},b,{_side:'away',_vsp:g.homePitcherName})); });
    homeMatchups.forEach(function(b){ combined.push(Object.assign({},b,{_side:'home',_vsp:g.awayPitcherName})); });
    var top6 = sortBy(combined, 'matchup_score', 'desc').slice(0, 6);

    html += '<div class="section-title">&#9733; Best Matchups — Combined</div>';
    html += renderBatterTable(top6, 'best', gameIdx, true);

    html += '<div class="legend">';
    html += '<span class="sample-high">&#9679; High PA (&gt;300)</span> &nbsp;';
    html += '<span class="sample-medium">&#9679; Medium (150-300)</span> &nbsp;';
    html += '<span class="sample-thin">&#9679; Thin (75-150)</span> &nbsp;';
    html += '<span class="sample-very-thin">&#9679; Very Thin (&lt;75)</span>';
    html += '</div>';

    // Pitcher cards
    html += '<div class="section-title">Pitchers</div>';
    html += '<div class="pitcher-cards">';
    html += renderPitcherCard(g.awayPitcherId, g.awayPitcherName, g.awayTeam, g.awayThrows);
    html += renderPitcherCard(g.homePitcherId, g.homePitcherName, g.homeTeam, g.homeThrows);
    html += '</div>';

    html += '<hr class="section-divider">';

    // Away batters section
    html += '<div class="section-title">' + esc(g.awayTeam) + ' Batters &mdash; vs ' + esc(g.homePitcherName||g.homeTeam+' P') + '</div>';
    if (!awayMatchups.length) {
      html += '<div class="error-msg">No away batter data.</div>';
    } else {
      html += renderBatterTable(awayMatchups, 'away', gameIdx, false);
    }

    html += '<hr class="section-divider">';

    // Home batters section
    html += '<div class="section-title">' + esc(g.homeTeam) + ' Batters &mdash; vs ' + esc(g.awayPitcherName||g.awayTeam+' P') + '</div>';
    if (!homeMatchups.length) {
      html += '<div class="error-msg">No home batter data.</div>';
    } else {
      html += renderBatterTable(homeMatchups, 'home', gameIdx, false);
    }

    return html;
  }

  function renderBatterTable(matchups, side, gameIdx, showTeam) {
    if (!matchups || !matchups.length) return '<div class="error-msg">No data.</div>';

    var mVals  = matchups.map(function(b){ return b.matchup_score; });
    var cVals  = matchups.map(function(b){ return b.ceiling; });
    var pbVals = matchups.map(function(b){ return b.pull_brl_pct; });
    var bbVals = matchups.map(function(b){ return b.brl_bip_pct; });
    var fbVals = matchups.map(function(b){ return b.fb_pct; });
    var hhVals = matchups.map(function(b){ return b.hh_pct; });
    var khrVals= matchups.map(function(b){ return b.khr; });
    var isoVals= matchups.map(function(b){ return b.iso; });
    var xwVals = matchups.map(function(b){ return b.xwoba; });

    var sortKey = side === 'away' ? state.awayBatterSort : (side === 'home' ? state.homeBatterSort : 'matchup_score');
    var sortDir = side === 'away' ? state.awayBatterDir  : (side === 'home' ? state.homeBatterDir  : 'desc');
    var sorted  = (side === 'best') ? matchups : sortBy(matchups, sortKey, sortDir);

    var headers = ['HITTER'];
    if (showTeam) headers.push('TEAM');
    headers = headers.concat(['MATCHUP','CEILING','ZONE FIT','KHR','HR FORM','PIT','BIP','ISO','xWOBA','xWOBAC','SWSTR%','PULLBRL%','BRL%','FB%','HH%','LA','LIKELY']);
    var sortKeys = ['name'];
    if (showTeam) sortKeys.push('team');
    sortKeys = sortKeys.concat(['matchup_score','ceiling','zone_fit','khr','hr_form','pit','bip','iso','xwoba','xwobac','swstr_pct','pull_brl_pct','brl_bip_pct','fb_pct','hh_pct','la','likely']);

    var html = '<div class="table-wrap"><table><thead><tr>';
    headers.forEach(function(h, i) {
      var sk = sortKeys[i];
      var isActive = (side!=='best') && (sortKey===sk);
      var arrow = isActive ? (sortDir==='desc'?' ▼':' ▲') : '';
      var onclick = (side!=='best' && sk!=='pit' && sk!=='bip') ? ' onclick="sortBatterTable(\'' + side + '\',\'' + sk + '\',' + gameIdx + ')"' : '';
      var align = (i===0||(showTeam&&i===1)) ? ' style="text-align:left"' : '';
      html += '<th' + align + onclick + '>' + h + '<span class="sort-indicator">' + arrow + '</span></th>';
    });
    html += '</tr></thead><tbody>';

    sorted.forEach(function(b) {
      var bip = b.bip || 0;
      var nameClass = bip>300?'sample-high':bip>=150?'sample-medium':bip>=75?'sample-thin':'sample-very-thin';
      var trendIcon='', trendClass='trend-neutral';
      if (b.hr_form_trend==='up'){trendIcon=' &#8679;';trendClass='trend-up';}
      else if (b.hr_form_trend==='down'){trendIcon=' &#8681;';trendClass='trend-down';}
      else {trendIcon=' &#8594;';}
      var hrFormCell = (b.hr_form!=null?fmtPct(b.hr_form):'—') + '<span class="' + trendClass + '">' + trendIcon + '</span>';

      var mStyle  = percentileColor(b.matchup_score, mVals,  true);
      var cStyle  = percentileColor(b.ceiling,       cVals,  true);
      var zStyle  = b.zone_fit > 0.12 ? 'background:#c8f5c8' : b.zone_fit < 0.06 ? 'background:#ffc8c8' : '';
      var kStyle  = percentileColor(b.khr,           khrVals,true);
      var iStyle  = percentileColor(b.iso,           isoVals,true);
      var xwStyle = percentileColor(b.xwoba,         xwVals, true);
      var xcStyle = getColumnColor(b.xwobac, 'xwobac');
      var swStyle = getColumnColor(b.swstr_pct, 'swstr_pct');
      var pbStyle = percentileColor(b.pull_brl_pct, pbVals, true);
      var bbStyle = percentileColor(b.brl_bip_pct, bbVals, true);
      var fbStyle = percentileColor(b.fb_pct,      fbVals, true);
      var hhStyle = percentileColor(b.hh_pct,      hhVals, true);
      var laStyle = (b.la>=10&&b.la<=22)?'background:#c8f5c8':(b.la<5||b.la>28)?'background:#ffc8c8':'';
      var liStyle = getColumnColor(b.likely, 'likely');

      html += '<tr>';
      html += '<td style="text-align:left"><span class="' + nameClass + '">' + esc(b.name) + '</span></td>';
      if (showTeam) html += '<td style="text-align:left">' + esc(b.team||b._side||'') + '</td>';
      html += '<td' + (mStyle  ? ' style="'+mStyle+'"'  : '') + '>' + fmtDec(b.matchup_score,3) + '</td>';
      html += '<td' + (cStyle  ? ' style="'+cStyle+'"'  : '') + '>' + fmtDec(b.ceiling,3) + '</td>';
      html += '<td' + (zStyle  ? ' style="'+zStyle+'"'  : '') + '>' + fmtDec(b.zone_fit,3) + '</td>';
      html += '<td' + (kStyle  ? ' style="'+kStyle+'"'  : '') + '>' + fmtDec(b.khr,3) + '</td>';
      html += '<td>' + hrFormCell + '</td>';
      html += '<td>' + fmtInt(b.pit)  + '</td>';
      html += '<td>' + fmtInt(b.bip)  + '</td>';
      html += '<td' + (iStyle  ? ' style="'+iStyle+'"'  : '') + '>' + fmtDec(b.iso,3) + '</td>';
      html += '<td' + (xwStyle ? ' style="'+xwStyle+'"' : '') + '>' + fmtOdds(b.xwoba) + '</td>';
      html += '<td' + (xcStyle ? ' style="'+xcStyle+'"' : '') + '>' + fmtOdds(b.xwobac) + '</td>';
      html += '<td' + (swStyle ? ' style="'+swStyle+'"' : '') + '>' + fmtPct(b.swstr_pct) + '</td>';
      html += '<td' + (pbStyle ? ' style="'+pbStyle+'"' : '') + '>' + fmtPct(b.pull_brl_pct) + '</td>';
      html += '<td' + (bbStyle ? ' style="'+bbStyle+'"' : '') + '>' + fmtPct(b.brl_bip_pct) + '</td>';
      html += '<td' + (fbStyle ? ' style="'+fbStyle+'"' : '') + '>' + fmtPct(b.fb_pct) + '</td>';
      html += '<td' + (hhStyle ? ' style="'+hhStyle+'"' : '') + '>' + fmtPct(b.hh_pct) + '</td>';
      html += '<td' + (laStyle ? ' style="'+laStyle+'"' : '') + '>' + (b.la!=null ? fmtDec(b.la,1)+'&#176;' : '—') + '</td>';
      html += '<td' + (liStyle ? ' style="'+liStyle+'"' : '') + '>' + fmtInt(b.likely) + '</td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
  }

  function sortBatterTable(side, col, gameIdx) {
    if (side === 'away') {
      state.awayBatterDir = state.awayBatterSort===col ? (state.awayBatterDir==='desc'?'asc':'desc') : 'desc';
      state.awayBatterSort = col;
    } else {
      state.homeBatterDir = state.homeBatterSort===col ? (state.homeBatterDir==='desc'?'asc':'desc') : 'desc';
      state.homeBatterSort = col;
    }
    renderGameView(gameIdx);
  }

  // ── Pitcher Card ───────────────────────────────────────────────────────────
  function renderPitcherCard(pitcherId, pitcherName, team, throws) {
    var pid = String(pitcherId||'');
    var pd  = (typeof PITCHERS_BY_ID !== 'undefined' && PITCHERS_BY_ID && pid) ? PITCHERS_BY_ID[pid] : null;
    var tabKey = 'pc-' + pid;
    if (!state.pitcherCardTab[tabKey]) state.pitcherCardTab[tabKey] = 'summary';
    var activeTab = state.pitcherCardTab[tabKey];

    var html = '<div class="pitcher-card">';
    html += '<div class="pitcher-card-name">' + esc(pitcherName||(pd&&pd.name)||'TBD') + '</div>';
    html += '<div class="pitcher-card-sub">' + esc(team||(pd&&pd.team)||'') + ' &nbsp;|&nbsp; THROWS: ' + esc(throws||(pd&&pd.throws)||'—') + '</div>';

    html += '<div class="card-sub-tabs">';
    html += '<div class="card-sub-tab' + (activeTab==='summary'?' active':'') + '" onclick="selectPitcherCardTab(\'' + tabKey + '\',\'summary\')">Summary</div>';
    html += '<div class="card-sub-tab' + (activeTab==='arsenal'?' active':'') + '" onclick="selectPitcherCardTab(\'' + tabKey + '\',\'arsenal\')">Arsenal</div>';
    html += '</div>';

    if (activeTab === 'summary') {
      var stats = [{lbl:'ERA',val:pd?safe(pd.era):'—'},{lbl:'WHIP',val:pd?safe(pd.whip):'—'},{lbl:'K/9',val:pd?safe(pd.k9):'—'},{lbl:'BB/9',val:pd?safe(pd.bb9):'—'},{lbl:'FIP',val:pd?safe(pd.fip):'—'},{lbl:'xFIP',val:pd?safe(pd.xfip):'—'}];
      html += '<div class="stat-grid">';
      stats.forEach(function(s){ html += '<div class="stat-item"><div class="stat-val">' + esc(String(s.val)) + '</div><div class="stat-lbl">' + s.lbl + '</div></div>'; });
      html += '</div>';
      if (pd) {
        html += '<div style="margin-top:8px;font-size:11px;">';
        if (pd.pitcher_score != null) html += '<div>P.Score: <strong>' + fmtDec(pd.pitcher_score,3) + '</strong></div>';
        if (pd.xwoba != null)         html += '<div>xWOBA: <strong>' + fmtOdds(pd.xwoba) + '</strong></div>';
        if (pd.csw_pct != null)       html += '<div>CSW%: <strong>' + fmtPct(pd.csw_pct) + '</strong></div>';
        if (pd.swstr_pct != null)     html += '<div>SwStr%: <strong>' + fmtPct(pd.swstr_pct) + '</strong></div>';
        if (pd.hard_hit_pct != null)  html += '<div>Hard Hit%: <strong>' + fmtPct(pd.hard_hit_pct) + '</strong></div>';
        html += '</div>';
      }
    } else {
      var arsenal = (pd && pd.arsenal) ? pd.arsenal : [];
      if (!arsenal.length) {
        html += '<div style="color:#999;font-size:11px;padding:8px 0">No arsenal data available.</div>';
      } else {
        html += '<div class="table-wrap" style="margin:0"><table><thead><tr>';
        ['PITCH TYPE','USAGE%','VELO','SPIN','RV/100','WHIFF%','xWOBA'].forEach(function(h, i){ html += '<th' + (i===0?' style="text-align:left"':'') + '>' + h + '</th>'; });
        html += '</tr></thead><tbody>';
        arsenal.forEach(function(p) {
          var rvStyle = p.run_value != null ? (p.run_value < 0 ? ' style="background:#c8f5c8"' : p.run_value > 0 ? ' style="background:#ffc8c8"' : '') : '';
          html += '<tr>';
          html += '<td style="text-align:left">' + esc(p.pitch_name||p.abbrev||'?') + '</td>';
          html += '<td>' + fmtPct(p.pct) + '</td>';
          html += '<td>' + (p.velo!=null?fmtDec(p.velo,1):'—') + '</td>';
          html += '<td>' + (p.spin!=null?fmtInt(p.spin):'—') + '</td>';
          html += '<td' + rvStyle + '>' + (p.run_value!=null?fmtDec(p.run_value,1):'—') + '</td>';
          html += '<td>' + fmtPct(p.whiff_pct) + '</td>';
          html += '<td>' + fmtOdds(p.xwoba) + '</td>';
          html += '</tr>';
        });
        html += '</tbody></table></div>';
      }
    }

    html += '</div>';
    return html;
  }

  function selectPitcherCardTab(tabKey, tab) {
    state.pitcherCardTab[tabKey] = tab;
    renderMain();
  }

  // ── Rolling Sub-tab ────────────────────────────────────────────────────────
  function renderRollingSubTab(g, gameIdx) {
    var html = '<div class="rolling-note">Season stats — L30 requires separate API query.</div>';

    var renderSide = function(matchups, label) {
      if (!matchups || !matchups.length) return '<div class="error-msg">No data for ' + label + '</div>';
      var top3 = sortBy(matchups, 'matchup_score', 'desc').slice(0,3);
      var out = '<div class="section-title">' + esc(label) + '</div>';
      out += '<div class="table-wrap"><table><thead><tr>';
      ['PLAYER','PA','ISO','xWOBA','BARREL%','HARD HIT%','FB%','PULL%'].forEach(function(h,i){ out += '<th' + (i===0?' style="text-align:left"':'') + '>' + h + '</th>'; });
      out += '</tr></thead><tbody>';
      top3.forEach(function(b) {
        var bd = (typeof BATTERS_BY_ID!=='undefined'&&BATTERS_BY_ID) ? BATTERS_BY_ID[String(b.batterId||'')] : null;
        out += '<tr>';
        out += '<td style="text-align:left"><strong>' + esc(b.name) + '</strong></td>';
        out += '<td>' + fmtInt(b.bip||(bd&&bd.pa)) + '</td>';
        out += '<td>' + fmtDec(b.iso,3) + '</td>';
        out += '<td>' + fmtOdds(b.xwoba) + '</td>';
        out += '<td>' + fmtPct(b.brl_bip_pct) + '</td>';
        out += '<td>' + fmtPct(b.hh_pct) + '</td>';
        out += '<td>' + fmtPct(b.fb_pct) + '</td>';
        out += '<td>' + (bd&&bd.pull_pct?fmtPct(bd.pull_pct):'—') + '</td>';
        out += '</tr>';
      });
      out += '</tbody></table></div>';
      return out;
    };

    html += renderSide(g.awayMatchups, esc(g.awayTeam) + ' Batters (vs ' + esc(g.homePitcherName||'TBD') + ')');
    html += renderSide(g.homeMatchups, esc(g.homeTeam) + ' Batters (vs ' + esc(g.awayPitcherName||'TBD') + ')');
    return html;
  }

  // ── Zone Heat Map ──────────────────────────────────────────────────────────
  function renderZoneHeatMap(zones, type, title) {
    var allZero = !zones || zones.every(function(v){ return !v || v===0; });
    var html = '<div class="zone-map"><div class="zone-title">' + esc(title) + '</div>';
    if (allZero) {
      html += '<div class="zone-na">Zone data unavailable</div></div>';
      return html;
    }

    var cellSize = 72, shadow = 36;
    var W = cellSize*3 + shadow*2, H = cellSize*3 + shadow*2;
    var maxVal = type==='pitcher' ? Math.max.apply(null, zones.filter(function(v){return v;})) : 1;

    function cellColor(val) {
      if (val==null||isNaN(val)) return '#f5f5f5';
      if (type==='pitcher') {
        var r = maxVal>0 ? val/maxVal : 0;
        return 'rgb('+Math.round(21+(227-21)*(1-r))+','+Math.round(101+(242-101)*(1-r))+','+Math.round(192+(253-192)*(1-r))+')';
      }
      if (val < 0.200) return '#2196f3';
      if (val < 0.300) return '#64b5f6';
      if (val < 0.380) return '#fff9c4';
      if (val < 0.450) return '#ff9800';
      return '#f44336';
    }

    function fmtVal(val) {
      if (val==null||isNaN(val)||val===0) return '';
      return type==='pitcher' ? fmtPct(val) : fmtOdds(val);
    }

    html += '<svg width="' + W + '" height="' + H + '" style="border:1px solid #ccc;background:#fafafa">';

    // Shadow cells
    for (var sc=0;sc<3;sc++) {
      var sx=shadow+sc*cellSize;
      html += '<rect x="'+sx+'" y="0" width="'+cellSize+'" height="'+shadow+'" fill="#f0f0f0" stroke="#ddd"/>';
      html += '<rect x="'+sx+'" y="'+(shadow+3*cellSize)+'" width="'+cellSize+'" height="'+shadow+'" fill="#f0f0f0" stroke="#ddd"/>';
    }
    for (var sr=0;sr<3;sr++) {
      var sy=shadow+sr*cellSize;
      html += '<rect x="0" y="'+sy+'" width="'+shadow+'" height="'+cellSize+'" fill="#f0f0f0" stroke="#ddd"/>';
      html += '<rect x="'+(shadow+3*cellSize)+'" y="'+sy+'" width="'+shadow+'" height="'+cellSize+'" fill="#f0f0f0" stroke="#ddd"/>';
    }
    // Corners
    [[0,0],[shadow+3*cellSize,0],[0,shadow+3*cellSize],[shadow+3*cellSize,shadow+3*cellSize]].forEach(function(pt){
      html += '<rect x="'+pt[0]+'" y="'+pt[1]+'" width="'+shadow+'" height="'+shadow+'" fill="#e8e8e8" stroke="#ddd"/>';
    });

    // Strike zone 3×3
    for (var row=0;row<3;row++) {
      for (var col=0;col<3;col++) {
        var zi = row*3+col;
        var val = zones && zones[zi]!=null ? zones[zi] : null;
        var cx2 = shadow+col*cellSize, cy2 = shadow+row*cellSize;
        var color = cellColor(val);
        var textColor = (type==='batter'&&val>=0.380)?'#fff':'#333';
        html += '<rect x="'+cx2+'" y="'+cy2+'" width="'+cellSize+'" height="'+cellSize+'" fill="'+color+'" stroke="#999"/>';
        html += '<text x="'+(cx2+4)+'" y="'+(cy2+12)+'" font-size="9" fill="'+textColor+'" opacity="0.45">'+(zi+1)+'</text>';
        if (val!=null&&val!==0) {
          html += '<text x="'+(cx2+cellSize/2)+'" y="'+(cy2+cellSize/2+5)+'" text-anchor="middle" font-size="12" font-weight="600" fill="'+textColor+'">'+fmtVal(val)+'</text>';
        }
      }
    }

    html += '</svg>';

    if (type==='batter') {
      html += '<div class="zone-legend">';
      [['#2196f3','<.200'],['#64b5f6','.200-.300'],['#fff9c4','.300-.380'],['#ff9800','.380-.450'],['#f44336','>.450']].forEach(function(pair){
        html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:'+pair[0]+'"></div><span>'+pair[1]+'</span></div>';
      });
      html += '</div>';
    } else {
      html += '<div class="zone-legend">';
      html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:#e3f2fd"></div><span>Low%</span></div>';
      html += '<div class="zone-legend-item"><div class="zone-legend-swatch" style="background:#1565c0"></div><span>High%</span></div>';
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  // ── Pitcher Zones Sub-tab ──────────────────────────────────────────────────
  function renderPitcherZonesSubTab(g, gameIdx) {
    var html = '<div class="section-title">Pitcher Zones — Pitch Location % (Season)</div>';
    html += '<div class="zone-section">';
    [[g.awayPitcherId, g.awayPitcherName, g.awayTeam],[g.homePitcherId, g.homePitcherName, g.homeTeam]].forEach(function(row) {
      var pid = row[0], pname = row[1], team = row[2];
      var pd = (typeof PITCHERS_BY_ID!=='undefined'&&PITCHERS_BY_ID&&pid) ? PITCHERS_BY_ID[String(pid)] : null;
      var zones = pd && pd.zones ? pd.zones : null;
      html += renderZoneHeatMap(zones, 'pitcher', esc(pname||'—')+' ('+esc(team)+') — Pitch Location %');
    });
    html += '</div>';
    return html;
  }

  // ── Hitter Zones Sub-tab (both teams, no toggle) ───────────────────────────
  function renderHitterZonesSubTab(g, gameIdx) {
    var html = '';

    var renderSideZones = function(matchups, label, side) {
      if (!matchups || !matchups.length) return '<div class="error-msg">No batter data for '+label+'</div>';
      var selIdx = side==='away' ? state.selectedAwayBatter : state.selectedHomeBatter;
      if (selIdx >= matchups.length) selIdx = 0;

      var out = '<div class="section-title">' + label + '</div>';
      out += '<div class="batter-selector">';
      matchups.forEach(function(b, i) {
        out += '<div class="batter-btn' + (selIdx===i?' active':'') + '" onclick="selectBatter(\'' + side + '\',' + i + ',' + gameIdx + ')">' + esc(b.name) + '</div>';
      });
      out += '</div>';

      var batter = matchups[selIdx];
      var bd = (typeof BATTERS_BY_ID!=='undefined'&&BATTERS_BY_ID&&batter) ? BATTERS_BY_ID[String(batter.batterId||'')] : null;
      var zones = (bd&&bd.zones) ? bd.zones : (batter&&batter.zones ? batter.zones : null);
      var title = batter ? esc(batter.name)+' — xwOBA by Zone (Season)' : 'Select a batter';
      out += renderZoneHeatMap(zones, 'batter', title);
      return out;
    };

    html += renderSideZones(g.awayMatchups, esc(g.awayTeam)+' Batters vs '+esc(g.homePitcherName||'TBD'), 'away');
    html += '<hr class="section-divider">';
    html += renderSideZones(g.homeMatchups, esc(g.homeTeam)+' Batters vs '+esc(g.awayPitcherName||'TBD'), 'home');
    return html;
  }

  function selectBatter(side, idx, gameIdx) {
    if (side === 'away') state.selectedAwayBatter = idx;
    else                 state.selectedHomeBatter = idx;
    renderGameView(gameIdx);
  }

  // ── Exports Sub-tab ────────────────────────────────────────────────────────
  function renderExportsSubTab(g, gameIdx) {
    var all = [];
    (g.awayMatchups||[]).forEach(function(b){ all.push(b); });
    (g.homeMatchups||[]).forEach(function(b){ all.push(b); });

    var hdr = 'Name,Team,Stands,Matchup,Ceiling,ZoneFit,KHR,HRForm,ISO,xWOBA,xWOBAC,SWSTR%,PullBrl%,BrlBIP%,FB%,HH%,LA,Likely';
    var rows = [hdr];
    all.forEach(function(b){
      rows.push([
        csvEsc(b.name),csvEsc(b.team),csvEsc(b.stands),
        fmt3(b.matchup_score),fmt3(b.ceiling),fmt3(b.zone_fit),fmt3(b.khr),
        (b.hr_form!=null?b.hr_form.toFixed(1)+'%':''),
        fmt3(b.iso),fmt3(b.xwoba),fmt3(b.xwobac),
        fmtPctRaw(b.swstr_pct),fmtPctRaw(b.pull_brl_pct),fmtPctRaw(b.brl_bip_pct),
        fmtPctRaw(b.fb_pct),fmtPctRaw(b.hh_pct),
        (b.la!=null?b.la.toFixed(1):''),
        (b.likely!=null?Math.round(b.likely):'')
      ].join(','));
    });

    var html = '<div class="section-title">CSV Export</div>';
    html += '<div class="exports-area">';
    html += '<textarea id="csv-output" readonly>' + esc(rows.join('\n')) + '</textarea>';
    html += '<button class="copy-btn" onclick="copyCSV()">Copy CSV</button>';
    html += '</div>';
    return html;
  }

  function csvEsc(s) {
    if (s==null) return '';
    var str = String(s);
    return (str.indexOf(',')>=0||str.indexOf('"')>=0||str.indexOf('\n')>=0) ? '"'+str.replace(/"/g,'""')+'"' : str;
  }
  function fmt3(v)      { return (v==null||isNaN(v))?'':v.toFixed(3); }
  function fmtPctRaw(v) { return (v==null||isNaN(v))?'':v.toFixed(1)+'%'; }

  function copyCSV() {
    var ta = document.getElementById('csv-output');
    if (!ta) return;
    ta.select();
    try { document.execCommand('copy'); } catch(e) { navigator.clipboard&&navigator.clipboard.writeText(ta.value); }
    var btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent='Copied!'; setTimeout(function(){ btn.textContent='Copy CSV'; },2000); }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', init);
  </script>
