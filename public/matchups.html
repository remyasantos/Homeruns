<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB HR Matchups — Statcast Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto Mono', monospace; font-size: 12px; background: #f5f5f5; color: #333; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header { background: #0d1117; color: white; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header-logo { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .header-date { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .header-right { display: flex; gap: 12px; align-items: center; }
    #weather-status { font-size: 10px; opacity: 0.55; }
    .theme-btn { background: transparent; border: 1px solid rgba(255,255,255,0.35); color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }

    #tab-bar { background: #1a1f2e; border-bottom: 2px solid #2d3748; padding: 6px 10px; display: flex; gap: 5px; overflow-x: auto; flex-shrink: 0; }
    .tab { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-size: 11px; line-height: 1.4; text-align: center; color: #aab; transition: background 0.15s; }
    .tab:hover { background: rgba(255,255,255,0.14); }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; }
    .tab .tab-teams { font-weight: 700; font-size: 12px; }
    .tab .tab-time { font-size: 10px; opacity: 0.8; }
    @keyframes pulse-live { 0%,100%{background:#c62828} 50%{background:#ef5350} }
    .tab-live { animation: pulse-live 1.4s infinite; border-color: #ef5350 !important; }

    #main-content { flex: 1; overflow-y: auto; padding: 12px 14px; }

    .section-title { font-size: 13px; font-weight: 700; margin: 14px 0 8px; color: #1a1f2e; display: flex; align-items: center; gap: 8px; }
    .row-count { font-size: 10px; font-weight: 400; background: #e2e8f0; color: #64748b; padding: 1px 6px; border-radius: 10px; }

    .cards-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 12px; min-width: 200px; flex: 1; max-width: 320px; }
    .card-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    .card-sub-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
    .card-sub-tab { padding: 2px 8px; font-size: 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: #f8f8f8; }
    .card-sub-tab.active { background: #1a1f2e; color: white; border-color: #1a1f2e; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 8px; }
    .stat-item { background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 4px; padding: 5px 2px; text-align: center; }
    .stat-val { font-weight: 700; font-size: 12px; }
    .stat-lbl { font-size: 9px; opacity: 0.6; margin-top: 1px; }
    .pitch-detail { font-size: 11px; margin-top: 8px; line-height: 1.7; }

    .table-wrap { overflow-x: auto; margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 11px; }
    thead th { background: #1a1f2e; color: #c8d0e0; padding: 7px 9px; text-align: right; font-weight: 600; white-space: nowrap; border-right: 1px solid #2d3748; cursor: pointer; user-select: none; }
    thead th:first-child { text-align: left; }
    thead th.sort-asc::after  { content: ' ▲'; font-size: 9px; }
    thead th.sort-desc::after { content: ' ▼'; font-size: 9px; }
    tbody tr:nth-child(even) { background: #f9fafb; }
    tbody tr:hover { background: #e8f0fe; }
    td { padding: 6px 9px; border-bottom: 1px solid #eee; text-align: right; white-space: nowrap; }
    td:first-child { text-align: left; }
    .badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; vertical-align: middle; }
    .badge-live { background: #ef5350; color: white; }
    .badge-l { background: #dbeafe; color: #1e40af; }
    .badge-r { background: #fef9c3; color: #92400e; }
    .badge-wind { background: #d4edda; color: #155724; }
    .badge-dome { background: #e2e3e5; color: #383d41; }
    .badge-hot  { background: #f8d7da; color: #721c24; }
    .badge-cold { background: #cce5ff; color: #004085; }

    .team-header { font-size: 13px; font-weight: 700; margin: 12px 0 6px; padding: 6px 10px; background: #e9ecef; border-left: 3px solid #2563eb; display: flex; justify-content: space-between; align-items: center; }
    .export-btn { font-size: 10px; font-weight: 400; padding: 2px 8px; cursor: pointer; border: 1px solid #999; border-radius: 3px; background: white; }
    .live-strip { background: #c62828; color: white; text-align: center; font-size: 11px; font-weight: 700; padding: 4px; letter-spacing: 1px; }

    .weather-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; padding: 2px; }
    .weather-card { background: white; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .weather-card-hdr { background: #343a40; color: white; padding: 8px 12px; }
    .weather-card-game { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .weather-card-venue { font-size: 10px; opacity: 0.75; margin-top: 2px; }
    .weather-card-body { display: flex; }
    .weather-field-wrap { padding: 10px; background: #f8f9fa; border-right: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: center; }
    .weather-stats { padding: 10px 14px; flex: 1; display: flex; flex-direction: column; gap: 7px; justify-content: center; }
    .ws-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .ws-lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .ws-val { font-size: 14px; font-weight: 700; color: #333; }
    .ws-val.hot { color: #c0392b; }
    .ws-val.cold { color: #1565c0; }
    .ws-val.wind-strong { color: #e65100; }
    .ws-val.wind-moderate { color: #f57f17; }
    .weather-card-badges { padding: 6px 12px 8px; display: flex; gap: 6px; flex-wrap: wrap; border-top: 1px solid #f0f0f0; background: #fafafa; min-height: 30px; align-items: center; }
    .weather-no-data { padding: 18px; text-align: center; color: #aaa; font-size: 11px; }

    .zone-grid { display: grid; grid-template-columns: repeat(3,28px); grid-template-rows: repeat(3,28px); gap: 2px; }
    .zone-cell { width: 28px; height: 28px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; }

    #filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .filter-chip { font-size: 10px; padding: 3px 10px; border: 1px solid #ccc; border-radius: 12px; cursor: pointer; background: white; }
    .filter-chip.active { background: #1a1f2e; color: white; border-color: #1a1f2e; }
    #search-box { font-size: 11px; padding: 3px 8px; border: 1px solid #ccc; border-radius: 4px; width: 140px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="header-logo">📋 MLB HR MATCHUPS</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="header-right">
      <span id="weather-status"></span>
      <button class="theme-btn" onclick="toggleTheme()">Dark</button>
    </div>
  </header>
  <div id="tab-bar"></div>
  <div id="main-content"></div>
</div>
<script src="matchups_data.js"></script>
<script>
var activeTab = 'slate';
var sortState = {};
var cardTabs  = {};
var darkMode  = false;

function gamesData() {
  if (typeof MATCHUPS_GAMES !== 'undefined') return MATCHUPS_GAMES;
  return [];
}
function pitchersData() {
  if (typeof PITCHERS_SLATE !== 'undefined') return PITCHERS_SLATE;
  if (typeof MATCHUPS_PITCHERS_SLATE !== 'undefined') return MATCHUPS_PITCHERS_SLATE;
  return [];
}
function pitcherById(pid) {
  if (typeof PITCHERS_BY_ID !== 'undefined' && PITCHERS_BY_ID[pid]) return PITCHERS_BY_ID[pid];
  return pitchersData().find(function(p){ return p.pitcherId === pid; }) || null;
}
function battersData() {
  if (typeof BATTERS_BY_ID !== 'undefined') return BATTERS_BY_ID;
  return {};
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET';
  } catch(e) { return iso; }
}
function isGameLive(g) {
  if (!g || !g.gameTime) return false;
  var now = Date.now();
  var t = new Date(g.gameTime).getTime();
  return now >= t && now <= t + 4*3600*1000;
}
function isWindOut(dir) {
  if (!dir) return false;
  var d = dir.toUpperCase();
  return d==='E'||d==='NE'||d==='ENE'||d==='NNE'||d==='ESE'||d==='SE';
}
function heatBg(val, min, max, invert) {
  if (val == null || isNaN(val)) return '#eee';
  var t = max===min ? 0.5 : (val-min)/(max-min);
  if (invert) t = 1-t;
  t = Math.max(0, Math.min(1, t));
  if (t < 0.5) {
    var r=Math.round(255*t*2), g=Math.round(255), b=0;
  } else {
    var r=255, g=Math.round(255*(1-(t-0.5)*2)), b=0;
  }
  return 'rgba('+r+','+g+','+b+',0.25)';
}

function buildTabBar() {
  var games = gamesData();
  var h = '';
  h += '<div class="tab'+(activeTab==='slate'?' active':'')+'", onclick="setTab(\'slate\')">'
  h += '<div class="tab-teams">📊 Slate Summary</div></div>';
  games.forEach(function(g,i) {
    var id = 'game-'+i;
    var live = isGameLive(g);
    var liveBadge = live ? ' <span class="badge badge-live">LIVE</span>' : '';
    h += '<div class="tab'+(activeTab===id?' active':'')+(live?' tab-live':'')+'", onclick="setTab(\''+id+'\')">'
    h += '<div class="tab-teams">'+esc(g.awayTeam)+' @ '+esc(g.homeTeam)+liveBadge+'</div>';
    h += '<div class="tab-time">'+fmtTime(g.gameTime)+'</div></div>';
  });
  h += '<div class="tab'+(activeTab==='weather'?' active':'')+'", onclick="setTab(\'weather\')">'
  h += '<div class="tab-teams">☀️ Weather</div></div>';
  document.getElementById('tab-bar').innerHTML = h;
}

function setTab(id) { activeTab = id; buildTabBar(); renderMain(); }

function slateView() {
  var ps = pitchersData();
  var games = gamesData();
  var allBatters = [];
  games.forEach(function(g){ (g.awayMatchups||[]).concat(g.homeMatchups||[]).forEach(function(b){ allBatters.push(b); }); });
  var h = '';
  h += '<h2 class="section-title">Top Slate Pitchers <span class="row-count">'+ps.length+' pitchers</span></h2>';
  h += pitcherTable(ps, 'slate-pitchers');
  h += '<h2 class="section-title">Top Slate Hitters <span class="row-count">'+allBatters.length+' rows</span></h2>';
  h += batterTable(allBatters, 'slate-batters');
  return h;
}

function windDirFromStr(s) {
  var map = {N:0,NNE:22.5,NE:45,ENE:67.5,E:90,ESE:112.5,SE:135,SSE:157.5,S:180,SSW:202.5,SW:225,WSW:247.5,W:270,WNW:292.5,NW:315,NNW:337.5};
  return map[(s||'').toUpperCase()] != null ? map[(s||'').toUpperCase()] : null;
}
function renderWindArrow(deg, mph) {
  var r = deg * Math.PI / 180;
  var cx=50, cy=50, len=28;
  var x2 = cx + len * Math.sin(r);
  var y2 = cy - len * Math.cos(r);
  var color = mph >= 15 ? '#e65100' : mph >= 8 ? '#f57f17' : '#43a047';
  return '<line x1="'+cx+'" y1="'+cy+'" x2="'+x2+'" y2="'+y2+'" stroke="'+color+'" stroke-width="3" stroke-linecap="round" marker-end="url(#arr)"/>';
}
function renderFieldSVG(windDir, windMph) {
  var deg = windDirFromStr(windDir);
  var arrow = (deg != null && windMph > 0) ? renderWindArrow(deg, windMph) : '';
  return '<svg width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">'
    + '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e65100"/></marker></defs>'
    + '<rect width="100" height="100" fill="#e8f5e9" rx="4"/>'
    + '<polygon points="50,15 85,50 50,85 15,50" fill="#8d6e63" opacity="0.25"/>'
    + '<polygon points="50,15 85,50 50,85 15,50" fill="none" stroke="#795548" stroke-width="1.5"/>'
    + '<circle cx="50" cy="50" r="4" fill="#795548"/>'
    + '<circle cx="50" cy="15" r="3" fill="#fff" stroke="#795548" stroke-width="1.5"/>'
    + '<circle cx="85" cy="50" r="3" fill="#fff" stroke="#795548" stroke-width="1.5"/>'
    + '<circle cx="15" cy="50" r="3" fill="#fff" stroke="#795548" stroke-width="1.5"/>'
    + arrow
    + '</svg>';
}
function renderWeatherCard(g) {
  var w = g.weather || {};
  var live = isGameLive(g);
  var windO = isWindOut(w.wind_dir);
  var tempF = w.temp_f != null ? w.temp_f : null;
  var windMph = w.wind_mph != null ? w.wind_mph : null;
  var tempCls = tempF != null ? (tempF >= 90 ? ' hot' : tempF <= 50 ? ' cold' : '') : '';
  var windCls = windMph != null ? (windMph >= 15 ? ' wind-strong' : windMph >= 8 ? ' wind-moderate' : '') : '';
  var h = '<div class="weather-card">';
  h += '<div class="weather-card-hdr">';
  h += '<div class="weather-card-game">'+esc(g.awayTeam)+' @ '+esc(g.homeTeam)+'</div>';
  h += '<div class="weather-card-venue">'+esc(g.park||'')+'  &bull;  '+fmtTime(g.gameTime)+'</div>';
  h += '</div>';
  h += '<div class="weather-card-body">';
  h += '<div class="weather-field-wrap">'+renderFieldSVG(w.wind_dir, windMph||0)+'</div>';
  h += '<div class="weather-stats">';
  h += '<div class="ws-row"><span class="ws-lbl">TEMP</span><span class="ws-val'+tempCls+'">'+(tempF!=null?tempF+'°F':'—')+'</span></div>';
  h += '<div class="ws-row"><span class="ws-lbl">WIND</span><span class="ws-val'+windCls+'">'+(windMph!=null?windMph+' mph '+esc(w.wind_dir||''):'—')+'</span></div>';
  h += '<div class="ws-row"><span class="ws-lbl">CONDITION</span><span class="ws-val">'+esc(w.condition||'—')+'</span></div>';
  h += '<div class="ws-row"><span class="ws-lbl">HUMIDITY</span><span class="ws-val">'+(w.humidity!=null?w.humidity+'%':'—')+'</span></div>';
  h += '</div></div>';
  h += '<div class="weather-card-badges">';
  if (live) h += '<span class="badge badge-live">LIVE</span>';
  if (w.roof) h += '<span class="badge badge-dome">DOME</span>';
  if (windO) h += '<span class="badge badge-wind">🚀 WIND OUT</span>';
  if (tempF != null && tempF >= 90) h += '<span class="badge badge-hot">HOT</span>';
  if (tempF != null && tempF <= 50) h += '<span class="badge badge-cold">COLD</span>';
  h += '</div>';
  h += '</div>';
  return h;
}
function weatherView() {
  var games = gamesData();
  var h = '<h2 class="section-title">☀️ Weather Summary</h2>';
  if (!games.length) return h + '<p style="color:#999">No games.</p>';
  h += '<div class="weather-grid">';
  games.forEach(function(g) { h += renderWeatherCard(g); });
  h += '</div>';
  return h;
}

function gameView(idx) {
  var games = gamesData();
  if (idx < 0 || idx >= games.length) return '<p style="color:red">Game not found.</p>';
  var g = games[idx];
  var gk = g.awayTeam+'@'+g.homeTeam;
  var live = isGameLive(g);
  var h = '';
  if (live) h += '<div class="live-strip">🔴 GAME IN PROGRESS — data reflects pre-game projections</div>';

  h += '<h2 class="section-title">Pitcher Cards</h2><div class="cards-grid">';
  [{key:'away',pid:g.awayPitcherId,name:g.awayPitcherName,team:g.awayTeam},
   {key:'home',pid:g.homePitcherId,name:g.homePitcherName,team:g.homeTeam}].forEach(function(pi) {
    var pd = pi.pid ? pitcherById(pi.pid) : null;
    var tk = gk+'-'+pi.key;
    h += '<div class="card"><div class="card-title">'+esc(pi.name||'TBD')+' ('+esc(pi.team)+')';
    if (pd && pd.throws) h += ' ['+esc(pd.throws)+']';
    h += '</div>'+pitcherCard(pd, tk)+'</div>';
  });
  h += '</div>';

  var awayTbl = 'g'+idx+'-away';
  h += '<div class="team-header"><span>'+esc(g.awayTeam)+' Batters vs '+esc(g.homePitcherName||'TBD')+(g.homeThrows?' ['+g.homeThrows+']':'')+' </span>';
  h += '<button class="export-btn" onclick="exportCSV(gamesData()['+idx+'].awayMatchups,\''+esc(gk)+'-away\')">&#11015; CSV</button></div>';
  h += batterTable(g.awayMatchups||[], awayTbl);

  var homeTbl = 'g'+idx+'-home';
  h += '<div class="team-header"><span>'+esc(g.homeTeam)+' Batters vs '+esc(g.awayPitcherName||'TBD')+(g.awayThrows?' ['+g.awayThrows+']':'')+' </span>';
  h += '<button class="export-btn" onclick="exportCSV(gamesData()['+idx+'].homeMatchups,\''+esc(gk)+'-home\')">&#11015; CSV</button></div>';
  h += batterTable(g.homeMatchups||[], homeTbl);
  return h;
}

function pitcherCard(pd, key) {
  var h = '';
  var tabs = ['Stats','Pitches','Zones'];
  var ct = cardTabs[key] || 'Stats';
  h += '<div class="card-sub-tabs">';
  tabs.forEach(function(t) {
    h += '<span class="card-sub-tab'+(ct===t?' active':''+'"')+' onclick="setCardTab(\''+key+'\',\''+t+'\')">'+t+'</span>';
  });
  h += '</div>';
  if (!pd) {
    return h + '<div style="color:#999;font-size:11px">No data available</div>';
  }
  if (ct==='Stats') {
    var stats = [
      {l:'ERA',   v: pd.era   != null ? pd.era.toFixed(2)   : '—'},
      {l:'WHIP',  v: pd.whip  != null ? pd.whip.toFixed(2)  : '—'},
      {l:'K/9',   v: pd.k9    != null ? pd.k9.toFixed(1)    : '—'},
      {l:'FIP',   v: pd.fip   != null ? pd.fip.toFixed(2)   : '—'},
      {l:'IP',    v: pd.ip    != null ? pd.ip.toFixed(1)    : '—'},
      {l:'HR/9',  v: pd.hr9   != null ? pd.hr9.toFixed(2)   : '—'},
    ];
    h += '<div class="stat-grid">';
    stats.forEach(function(s) { h += '<div class="stat-item"><div class="stat-val">'+s.v+'</div><div class="stat-lbl">'+s.l+'</div></div>'; });
    h += '</div>';
    if (pd.csw_pct != null) {
      h += '<div class="pitch-detail">';
      h += 'CSW: '+(pd.csw_pct||0).toFixed(1)+'%  ';
      h += 'SwStr: '+(pd.swstr_pct||0).toFixed(1)+'%  ';
      h += 'FB%: '+(pd.fb_pct||0).toFixed(1)+'%';
      h += '</div>';
    }
  } else if (ct==='Pitches') {
    var ar = pd.arsenal || [];
    if (!ar.length) { h += '<div style="color:#999;font-size:11px">No pitch data</div>'; }
    else {
      h += '<div class="pitch-detail">';
      ar.forEach(function(p) {
        h += (p.pitch_name||p.abbrev)+': '+(p.pct*100).toFixed(0)+'%';
        if (p.velo) h += ' '+p.velo.toFixed(1)+'mph';
        h += '<br>';
      });
      h += '</div>';
    }
  } else {
    h += '<div style="color:#999;font-size:11px">Zone data N/A</div>';
  }
  return h;
}

function setCardTab(key, tab) { cardTabs[key] = tab; renderMain(); }

function pitcherTable(rows, tblId) {
  var cols = [
    {k:'pitcherName',l:'Pitcher',       fmt:null,      asc:true},
    {k:'team',       l:'Team',          fmt:null,      asc:true},
    {k:'throws',     l:'Throws',        fmt:null,      asc:true},
    {k:'era',        l:'ERA',           fmt:'f2',      asc:true},
    {k:'whip',       l:'WHIP',          fmt:'f2',      asc:true},
    {k:'k9',         l:'K/9',           fmt:'f1',      asc:false},
    {k:'fip',        l:'FIP',           fmt:'f2',      asc:true},
    {k:'ip',         l:'IP',            fmt:'f1',      asc:false},
    {k:'csw_pct',    l:'CSW%',          fmt:'pct1',    asc:false},
    {k:'swstr_pct',  l:'SwStr%',        fmt:'pct1',    asc:false},
    {k:'fb_pct',     l:'FB%',           fmt:'pct1',    asc:false},
    {k:'slateRank',  l:'Rank',          fmt:null,      asc:true},
  ];
  var ss = sortState[tblId];
  var sorted = rows.slice();
  if (ss) {
    sorted.sort(function(a,b){
      var av = a[ss.k], bv = b[ss.k];
      if (av == null) av = ss.asc ? Infinity : -Infinity;
      if (bv == null) bv = ss.asc ? Infinity : -Infinity;
      return ss.asc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }
  function fmtVal(v, fmt) {
    if (v == null || v === '') return '—';
    if (fmt === 'f2') return parseFloat(v).toFixed(2);
    if (fmt === 'f1') return parseFloat(v).toFixed(1);
    if (fmt === 'pct1') return parseFloat(v).toFixed(1)+'%';
    return v;
  }
  var h = '<div class="table-wrap"><table id="'+tblId+'">';
  h += '<thead><tr>';
  cols.forEach(function(c,i) {
    var cls = ss && ss.k===c.k ? (ss.asc?'sort-asc':'sort-desc') : '';
    h += '<th class="'+cls+'" onclick="sortTable(\''+tblId+'\',\''+c.k+'\','+c.asc+')">'+c.l+'</th>';
  });
  h += '</tr></thead><tbody>';
  sorted.forEach(function(p) {
    h += '<tr>';
    cols.forEach(function(c) {
      var v = p[c.k];
      if (c.k==='pitcherName') {
        h += '<td>'+esc(v||'—')+'</td>';
      } else if (c.k==='throws') {
        var cls2 = v==='L' ? 'badge-l' : 'badge-r';
        h += '<td><span class="badge '+cls2+'">'+esc(v||'?')+'</span></td>';
      } else {
        h += '<td>'+fmtVal(v, c.fmt)+'</td>';
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function batterTable(rows, tblId) {
  var BD = battersData();
  var enriched = rows.map(function(b) {
    var bd = BD[b.playerId] || {};
    return Object.assign({}, bd, b);
  });
  var cols = [
    {k:'name',       l:'Batter',        fmt:null,   asc:true,  rng:[0,0]},
    {k:'stands',     l:'B',             fmt:null,   asc:true,  rng:[0,0]},
    {k:'khr',        l:'KHR',           fmt:'f2',   asc:false, rng:[0,5]},
    {k:'xwoba',      l:'xwOBA',         fmt:'f3',   asc:false, rng:[0.25,0.45]},
    {k:'barrel_pct', l:'Brl%',          fmt:'pct1', asc:false, rng:[0,15]},
    {k:'hard_hit',   l:'HH%',           fmt:'pct1', asc:false, rng:[30,55]},
    {k:'zone_fit',   l:'ZoneFit',       fmt:'f3',   asc:false, rng:[0,1]},
    {k:'matchup_score',l:'Score',       fmt:'f1',   asc:false, rng:[0,100]},
    {k:'hr',         l:'HR',            fmt:null,   asc:false, rng:[0,20]},
    {k:'ops',        l:'OPS',           fmt:'f3',   asc:false, rng:[0.6,1.0]},
    {k:'iso',        l:'ISO',           fmt:'f3',   asc:false, rng:[0.1,0.3]},
    {k:'avg',        l:'AVG',           fmt:'f3',   asc:false, rng:[0.2,0.35]},
  ];
  var colVals = {};
  cols.forEach(function(c) {
    if (!c.rng || (c.rng[0]===0 && c.rng[1]===0)) return;
    var vals = enriched.map(function(r){return r[c.k]}).filter(function(v){return v!=null&&!isNaN(v);});
    colVals[c.k] = {min: c.rng[0], max: c.rng[1]};
  });
  var ss = sortState[tblId];
  var sorted = enriched.slice();
  if (ss) {
    sorted.sort(function(a,b){
      var av = a[ss.k], bv = b[ss.k];
      if (av == null) av = ss.asc ? Infinity : -Infinity;
      if (bv == null) bv = ss.asc ? Infinity : -Infinity;
      return ss.asc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }
  function fmtVal(v, fmt) {
    if (v == null || v === '') return '—';
    if (fmt==='f3') return parseFloat(v).toFixed(3);
    if (fmt==='f2') return parseFloat(v).toFixed(2);
    if (fmt==='f1') return parseFloat(v).toFixed(1);
    if (fmt==='pct1') return parseFloat(v).toFixed(1)+'%';
    return v;
  }
  var h = '<div class="table-wrap"><table id="'+tblId+'">';
  h += '<thead><tr>';
  cols.forEach(function(c) {
    var cls = ss && ss.k===c.k ? (ss.asc?'sort-asc':'sort-desc') : '';
    h += '<th class="'+cls+'" onclick="sortTable(\''+tblId+'\',\''+c.k+'\','+c.asc+')">'+c.l+'</th>';
  });
  h += '</tr></thead><tbody>';
  sorted.forEach(function(b) {
    h += '<tr>';
    cols.forEach(function(c) {
      var v = b[c.k];
      var bg = '';
      if (colVals[c.k]) {
        var rng = colVals[c.k];
        bg = ' style="background:'+heatBg(v, rng.min, rng.max, c.asc)+'"';
      }
      if (c.k==='name') {
        h += '<td>'+esc(v||'—')+'</td>';
      } else if (c.k==='stands') {
        var cls2 = v==='L' ? 'badge-l' : 'badge-r';
        h += '<td><span class="badge '+cls2+'">'+esc(v||'?')+'</span></td>';
      } else {
        h += '<td'+bg+'>'+fmtVal(v,c.fmt)+'</td>';
      }
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function sortTable(tblId, key, defaultAsc) {
  var cur = sortState[tblId];
  if (cur && cur.k === key) {
    sortState[tblId] = {k: key, asc: !cur.asc};
  } else {
    sortState[tblId] = {k: key, asc: defaultAsc};
  }
  renderMain();
}

function exportCSV(rows, filename) {
  if (!rows || !rows.length) return;
  var BD = battersData();
  var cols = ['name','stands','khr','xwoba','barrel_pct','hard_hit','zone_fit','matchup_score','hr','ops','iso','avg'];
  var lines = [cols.join(',')];
  rows.forEach(function(b) {
    var bd = BD[b.playerId] || {};
    var merged = Object.assign({}, bd, b);
    var row = [
      '"'+(merged.name||'')+'",', merged.stands||'R',
      merged.khr||0, merged.xwoba||0, merged.barrel_pct||0, merged.hard_hit||0,
      merged.zone_fit||0, merged.matchup_score||0, merged.hr||0,
      merged.ops||0, merged.iso||0, merged.avg||0
    ];
    lines.push(row.join(','));
  });
  var blob = new Blob([lines.join('\n')], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename+'.csv';
  a.click();
}

function renderMain() {
  var h = '';
  if (activeTab === 'slate') {
    h = slateView();
  } else if (activeTab === 'weather') {
    h = weatherView();
  } else {
    var m = activeTab.match(/^game-(\d+)$/);
    if (m) h = gameView(parseInt(m[1]));
    else h = '<p style="color:red">Unknown tab</p>';
  }
  document.getElementById('main-content').innerHTML = h;
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.style.background = darkMode ? '#0d1117' : '#f5f5f5';
  document.body.style.color      = darkMode ? '#c9d1d9' : '#333';
}

window.onload = function() {
  var games = gamesData();
  var d = games.length ? new Date(games[0].gameTime) : new Date();
  document.getElementById('header-date').textContent =
    d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric',timeZone:'America/New_York'});
  var hasWeatherData = games.some(function(g){ return g.weather && (g.weather.temp_f || g.weather.wind_mph); });
  document.getElementById('weather-status').textContent = hasWeatherData ? '🌡️ Weather loaded' : '';
  buildTabBar();
  renderMain();
};
</script>
